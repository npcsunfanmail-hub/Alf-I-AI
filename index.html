<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alf-I</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a2e; display: flex; justify-content: center; align-items: center; -webkit-text-size-adjust: 100%; }
  #app { width: 100%; max-width: 500px; height: 100dvh; background: linear-gradient(180deg, #1a1a4e 0%, #0d0d3a 40%, #0a0a2e 100%); display: flex; flex-direction: column; position: relative; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
  #face-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; min-height: 0; transition: flex 0.3s; }
  #face-container.drawer-open { flex: 0.4; }
  #face { width: min(82vw, 380px); aspect-ratio: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: min(4.5vw, 20px); animation: faceIdle 5s ease-in-out infinite; transition: filter 0.6s, transform 0.3s; }
  #face-container.drawer-open #face { width: min(58vw, 260px); }
  @keyframes faceIdle { 0%, 100% { transform: translateY(0px) rotate(0deg); } 25% { transform: translateY(-6px) rotate(1.2deg); } 50% { transform: translateY(-10px) rotate(0deg); } 75% { transform: translateY(-6px) rotate(-1.2deg); } }
  #face.thinking { animation: faceThink 4s ease-in-out infinite; }
  @keyframes faceThink { 0%, 100% { transform: translateY(-3px) rotate(0.5deg); } 50% { transform: translateY(-8px) rotate(-0.5deg); } }

  #brow-group { display: flex; gap: min(16vw, 70px); align-items: center; justify-content: center; width: 100%; }
  .brow { width: min(22vw, 90px); height: min(1.6vw, 7px); background: white; border-radius: min(0.8vw, 3px); transition: transform 0.5s ease; box-shadow: 0 0 16px rgba(255,255,255,0.1); }
  .brow.raise { transform: translateY(-6px); }

  #eye-group { display: flex; gap: min(16vw, 70px); align-items: center; justify-content: center; width: 100%; }
  .eye { width: min(16vw, 68px); height: min(26vw, 110px); background: white; border-radius: min(1.4vw, 6px); position: relative; display: flex; align-items: center; justify-content: center; transition: height 0.1s ease; box-shadow: 0 0 40px rgba(255,255,255,0.1); }
  .eye.blink { height: min(0.8vw, 3px); }
  .eye.widen { height: min(30vw, 120px); transition: height 0.2s ease; }
  .thinking .eye.blink { height: min(0.8vw, 3px); transition: height 0.25s ease; }
  .pupil { width: min(7vw, 30px); height: min(10vw, 42px); background: linear-gradient(135deg, #1a1a4e, #0a0a2e); border-radius: min(0.8vw, 3px); position: relative; transition: transform 0.5s ease; animation: pupilDrift 12s ease-in-out infinite; }
  .pupil::after { content: ''; position: absolute; width: min(2.4vw, 10px); height: min(2.4vw, 10px); background: rgba(255,255,255,0.35); border-radius: 50%; top: min(1.2vw, 5px); right: min(1.2vw, 5px); }
  @keyframes pupilDrift { 0%, 100% { transform: translateX(0px) translateY(0px); } 25% { transform: translateX(-4px) translateY(0px); } 50% { transform: translateX(0px) translateY(-3px); } 75% { transform: translateX(4px) translateY(0px); } }
  .thinking .pupil { animation: pupilThink 3s ease-in-out infinite; }
  @keyframes pupilThink { 0%, 100% { transform: translateX(0px) translateY(-4px); } 50% { transform: translateX(0px) translateY(-8px); } }

  #mouth-area { display: flex; align-items: center; justify-content: center; }
  #mouth { width: min(24vw, 100px); height: min(2vw, 8px); background: white; border-radius: min(0.8vw, 3px); transition: width 0.15s ease, background 0.1s, border 0.1s; box-shadow: 0 0 24px rgba(255,255,255,0.08); }
  #mouth.open { width: min(28vw, 118px); background: #0a0a2e; border: min(0.3vw, 1.5px) solid rgba(255,255,255,0.7); border-radius: min(1.2vw, 5px); }

  #name-label { color: rgba(255,255,255,0.12); font-size: min(2.8vw, 13px); font-weight: 400; letter-spacing: 4px; text-transform: uppercase; margin-top: min(4vw, 18px); pointer-events: none; }
  #status-text { color: rgba(255,255,255,0.4); font-size: min(3.2vw, 14px); text-align: center; padding: min(2vw, 10px); letter-spacing: 1px; }
  #bottom-area { flex-shrink: 0; padding: min(3vw, 14px) min(4vw, 20px) max(env(safe-area-inset-bottom, 8px), min(4vw, 20px)); background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.06); }
  #input-row { display: flex; gap: 6px; align-items: center; background: rgba(255,255,255,0.08); border-radius: 24px; padding: 4px 4px 4px 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  #input { flex: 1; min-width: 0; background: none; border: none; color: white; font-size: 16px; outline: none; padding: 9px 0; }
  #input::placeholder { color: rgba(255,255,255,0.3); }
  .icon-btn { background: none; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
  .icon-btn svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.6); }
  .icon-btn:active { background: rgba(255,255,255,0.15); }
  .icon-btn:active svg { fill: white; }
  #tv-drawer-toggle.active svg { fill: #4fc3f7; }
  #voice-btn.listening { background: #ea4335; animation: pulse 1s infinite; }
  #voice-btn.listening svg { fill: white; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #tts-toggle.active svg { fill: #4fc3f7; }
  #send-btn svg { fill: #4fc3f7; }

  /* TV Drawer */
  #tv-drawer { display: none; flex-shrink: 0; background: rgba(15,15,50,0.98); border-top: 1px solid rgba(255,255,255,0.08); padding: min(2vw, 8px) min(3vw, 12px) max(env(safe-area-inset-bottom, 8px), min(3vw, 12px)); overflow-y: auto; max-height: 55vh; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  #tv-drawer.open { display: block; animation: drawerUp 0.3s ease; }
  @keyframes drawerUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  #tv-drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: min(2vw, 8px); padding: min(1.5vw, 6px) 0; }
  #tv-drawer-title { color: rgba(255,255,255,0.7); font-size: min(3.5vw, 14px); font-weight: 600; letter-spacing: 1px; }
  #tv-select-row { display: flex; align-items: center; gap: 6px; }
  #tv-select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: min(1.5vw, 6px) min(2vw, 8px); font-size: min(3vw, 12px); outline: none; max-width: 160px; }
  #tv-select option { background: #1a1a4e; color: white; }
  .tv-btn-sm { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); border-radius: 6px; cursor: pointer; padding: min(1.5vw, 6px) min(2.5vw, 10px); font-size: min(3.5vw, 14px); transition: all .15s; flex-shrink: 0; }
  .tv-btn-sm:active { background: rgba(255,255,255,0.2); }
  .tv-btn-sm.danger { color: #ef5350; border-color: rgba(239,83,80,0.3); }

  #tv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: min(1.5vw, 6px); }
  .tv-key { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); border-radius: min(2vw, 8px); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: min(2.5vw, 10px); font-size: min(3.8vw, 15px); transition: all .12s; user-select: none; -webkit-user-select: none; }
  .tv-key:active { background: rgba(255,255,255,0.18); transform: scale(0.93); }
  .tv-key.power { background: rgba(239,83,80,0.15); border-color: rgba(239,83,80,0.25); color: #ef5350; font-size: min(4.5vw, 18px); }
  .tv-key.power:active { background: rgba(239,83,80,0.3); }
  .tv-key.ok { background: rgba(79,195,247,0.15); border-color: rgba(79,195,247,0.25); color: #4fc3f7; font-size: min(4vw, 16px); font-weight: 600; }
  .tv-key.ok:active { background: rgba(79,195,247,0.3); }
  .tv-key.dpad { font-size: min(4vw, 16px); }
  .tv-key.wide { grid-column: span 1; }

  #tv-grid .empty { visibility: hidden; }

  #tv-feedback { color: rgba(255,255,255,0.3); font-size: min(2.8vw, 11px); text-align: center; padding: min(1.5vw, 6px); min-height: min(4vw, 16px); }

  /* Add TV Modal */
  #tv-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
  #tv-modal-overlay.open { display: flex; }
  #tv-modal { background: #1a1a4e; border: 1px solid rgba(255,255,255,0.1); border-radius: min(3vw, 12px); padding: min(5vw, 20px); width: min(85vw, 350px); }
  #tv-modal h3 { color: white; margin-bottom: min(3vw, 12px); font-size: min(4vw, 16px); }
  #tv-modal label { color: rgba(255,255,255,0.6); font-size: min(2.8vw, 11px); display: block; margin-top: min(2vw, 8px); margin-bottom: min(1vw, 4px); }
  #tv-modal input, #tv-modal select { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: white; border-radius: 6px; padding: min(2.5vw, 10px); font-size: min(3.5vw, 14px); outline: none; }
  #tv-modal select option { background: #1a1a4e; }
  #tv-modal-actions { display: flex; gap: 8px; margin-top: min(3vw, 12px); }
  #tv-modal-actions button { flex: 1; padding: min(2.5vw, 10px); border-radius: 6px; border: none; cursor: pointer; font-size: min(3.5vw, 14px); }
  #tv-modal-save { background: #4fc3f7; color: #0a0a2e; font-weight: 600; }
  #tv-modal-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
  #tv-modal-scan { background: #66bb6a; color: #0a0a2e; }

  #tv-scan-result { margin-top: min(2vw, 8px); color: rgba(255,255,255,0.5); font-size: min(2.8vw, 11px); }
  #tv-scan-result .found { color: #66bb6a; }
  #tv-scan-result .none { color: rgba(255,255,255,0.4); }

  @media (max-height: 640px) {
    #tv-drawer { max-height: 45vh; }
    #tv-grid { gap: min(1vw, 4px); }
    .tv-key { padding: min(2vw, 8px); font-size: min(3.2vw, 13px); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="face-container">
    <div id="face">
      <div id="brow-group">
        <div class="brow" id="left-brow"></div>
        <div class="brow" id="right-brow"></div>
      </div>
      <div id="eye-group">
        <div class="eye" id="left-eye">
          <div class="pupil"></div>
        </div>
        <div class="eye" id="right-eye">
          <div class="pupil"></div>
        </div>
      </div>
      <div id="mouth-area">
        <div id="mouth"></div>
      </div>
      <div id="name-label">ALF-I</div>
    </div>
    <div id="status-text">READY</div>
  </div>
  <div id="bottom-area">
    <div id="input-row">
      <input id="input" type="text" placeholder="Type a message..." autofocus>
      <button class="icon-btn" id="reset-btn" onclick="resetConversation()" title="New conversation">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="icon-btn" id="tv-drawer-toggle" onclick="toggleTVDrawer()" title="TV Remote">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      </button>
      <button class="icon-btn" id="voice-btn" onclick="toggleVoice()" title="Voice input">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="icon-btn active" id="tts-toggle" onclick="toggleTTS()" title="Voice output">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <button class="icon-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div id="tv-drawer">
    <div id="tv-drawer-header">
      <div id="tv-drawer-title">TV Remote</div>
      <div id="tv-select-row">
        <select id="tv-select" onchange="onTvSelect()">
          <option value="">-- No TV selected --</option>
        </select>
        <button class="tv-btn-sm" onclick="showAddTvModal()" title="Add TV">+</button>
        <button class="tv-btn-sm danger" id="tv-remove-btn" onclick="removeTv()" title="Remove TV" style="display:none">-</button>
      </div>
    </div>
    <div id="tv-grid">
      <button class="tv-key power" onclick="tvSend('PowerOff')" title="Toggle Power">⏻</button>
      <button class="tv-key" onclick="tvSend('Input')" title="Input/Source">HDMI</button>
      <button class="tv-key" onclick="tvSend('Menu')" title="Menu">Menu</button>

      <div></div>
      <button class="tv-key dpad" onclick="tvSend('Up')">▲</button>
      <div></div>

      <button class="tv-key dpad" onclick="tvSend('Left')">◀</button>
      <button class="tv-key ok" onclick="tvSend('Select')">OK</button>
      <button class="tv-key dpad" onclick="tvSend('Right')">▶</button>

      <div></div>
      <button class="tv-key dpad" onclick="tvSend('Down')">▼</button>
      <div></div>

      <button class="tv-key" onclick="tvSend('VolumeUp')">Vol+</button>
      <button class="tv-key" onclick="tvSend('Mute')">Mute</button>
      <button class="tv-key" onclick="tvSend('VolumeDown')">Vol-</button>

      <button class="tv-key" onclick="tvSend('Rev')">⏪</button>
      <button class="tv-key" onclick="tvSend('Play')">Play</button>
      <button class="tv-key" onclick="tvSend('Fwd')">⏩</button>

      <button class="tv-key" onclick="tvSend('Home')">Home</button>
      <button class="tv-key" onclick="tvSend('Back')">Back</button>
      <button class="tv-key" onclick="tvSend('Exit')">Exit</button>

      <button class="tv-key" onclick="tvSend('Netflix')">Netflix</button>
      <button class="tv-key" onclick="tvSend('YouTube')">YT</button>
      <button class="tv-key" onclick="tvSend('PrimeVideo')">Prime</button>
    </div>
    <div id="tv-feedback"></div>
  </div>
</div>

<div id="tv-modal-overlay">
  <div id="tv-modal">
    <h3>Add TV</h3>
    <label>TV Name</label>
    <input id="tv-name-input" type="text" placeholder="e.g. Living Room TV" value="Living Room TV">
    <label>IP Address</label>
    <input id="tv-ip-input" type="text" placeholder="e.g. 192.168.1.100">
    <label>Brand</label>
    <select id="tv-brand-input">
      <option value="roku">Roku</option>
      <option value="samsung">Samsung</option>
      <option value="lg">LG</option>
    </select>
    <div id="tv-scan-result"></div>
    <div id="tv-modal-actions">
      <button id="tv-modal-scan" onclick="scanTvs()">Scan</button>
      <button id="tv-modal-save" onclick="saveTv()">Add</button>
      <button id="tv-modal-cancel" onclick="hideAddTvModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const statusEl = document.getElementById('status-text');
const voiceBtn = document.getElementById('voice-btn');
const ttsBtn = document.getElementById('tts-toggle');
const mouth = document.getElementById('mouth');
const leftEye = document.getElementById('left-eye');
const rightEye = document.getElementById('right-eye');
const leftBrow = document.getElementById('left-brow');
const rightBrow = document.getElementById('right-brow');

let userId = localStorage.getItem('alfi_user_id') || crypto.randomUUID();
localStorage.setItem('alfi_user_id', userId);
let history = [];

async function loadHistory() {
  try {
    const res = await fetch('/api/sync?user_id=' + encodeURIComponent(userId));
    const data = await res.json();
    if (data.history && data.history.length) {
      history = data.history;
      localStorage.setItem('alfi_history', JSON.stringify(history));
    } else {
      const saved = localStorage.getItem('alfi_history');
      if (saved) history = JSON.parse(saved);
    }
  } catch (e) {
    const saved = localStorage.getItem('alfi_history');
    if (saved) history = JSON.parse(saved);
  }
}
loadHistory();
let ttsEnabled = true;
let isListening = false;
let isSpeaking = false;
let isThinking = false;
let recognition = null;
let blinkTimer = null;
let browTimer = null;
let mouthAnimFrame = null;
let mouthStart = 0;

const face = document.getElementById('face');
const pupils = document.querySelectorAll('.pupil');
const faceContainer = document.getElementById('face-container');

function blinkEyes() {
  const dur = isThinking ? 250 : 100;
  leftEye.classList.add('blink');
  rightEye.classList.add('blink');
  setTimeout(() => {
    leftEye.classList.remove('blink');
    rightEye.classList.remove('blink');
  }, dur);
  const next = isThinking ? 4000 + Math.random() * 3000 : 2000 + Math.random() * 4000;
  blinkTimer = setTimeout(blinkEyes, next);
}
blinkEyes();

function animateBrows() {
  if (isThinking || isSpeaking) { browTimer = setTimeout(animateBrows, 1000); return; }
  const both = Math.random() > 0.3;
  if (both) { leftBrow.classList.add('raise'); rightBrow.classList.add('raise'); }
  else if (Math.random() > 0.5) leftBrow.classList.add('raise');
  else rightBrow.classList.add('raise');
  setTimeout(() => {
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
  }, 500);
  const next = 2000 + Math.random() * 4000;
  browTimer = setTimeout(animateBrows, next);
}
animateBrows();

function startThinking() {
  isThinking = true;
  face.classList.add('thinking');
  leftBrow.classList.add('raise');
  rightBrow.classList.add('raise');
}

function stopThinking() {
  isThinking = false;
  face.classList.remove('thinking');
  leftBrow.classList.remove('raise');
  rightBrow.classList.remove('raise');
}

function happyReaction() {
  leftEye.classList.add('widen');
  rightEye.classList.add('widen');
  leftBrow.classList.add('raise');
  rightBrow.classList.add('raise');
  setTimeout(() => {
    leftEye.classList.remove('widen');
    rightEye.classList.remove('widen');
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
  }, 600);
}

function startMouthAnimation() {
  mouth.classList.add('open');
  mouthStart = performance.now();

  function step(time) {
    if (!isSpeaking) return;
    const t = (time - mouthStart) / 1000;

    const fSyllable = 4.5 + 1.2 * Math.sin(t * 0.4);
    const fFast = 7 + 2 * Math.sin(t * 0.6 + 0.8);
    const fPhrase = 1.4 + 0.6 * Math.sin(t * 0.25 + 1.5);

    const vowels = Math.abs(Math.sin(t * fSyllable * Math.PI));
    const consonants = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * fFast * Math.PI * 2));
    const phrasing = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * fPhrase * Math.PI * 2));

    let raw = vowels * 0.5 + consonants * 0.2 + phrasing * 0.3;
    raw += Math.sin(t * 14.7 * Math.PI) * 0.04;
    raw += Math.sin(t * 21.3 * Math.PI + 0.6) * 0.03;
    raw += Math.sin(t * 33.1 * Math.PI + 1.8) * 0.02;

    const openness = Math.max(0.08, Math.min(1, raw));
    const minH = 5, maxH = 26;
    const h = minH + openness * (maxH - minH);

    const r = 2 + openness * 4;
    mouth.style.height = h.toFixed(1) + 'px';
    mouth.style.borderRadius = r.toFixed(1) + 'px';
    mouthAnimFrame = requestAnimationFrame(step);
  }
  mouthAnimFrame = requestAnimationFrame(step);
}

function stopMouthAnimation() {
  isSpeaking = false;
  if (mouthAnimFrame) { cancelAnimationFrame(mouthAnimFrame); mouthAnimFrame = null; }
  mouth.classList.remove('open');
  mouth.style.height = '';
  mouth.style.borderRadius = '';
}

function setSpeaking(val) {
  isSpeaking = val;
  if (val) {
    leftBrow.classList.add('raise');
    rightBrow.classList.add('raise');
    startMouthAnimation();
  } else {

function findVoice() {
  const vs = window.speechSynthesis.getVoices();
  const list = vs.length ? vs : voicesCache;
  if (!list.length) return null;
  const isF = n => /female|zoe|vanessa|karen|natya|fiona|catherine|serena|tracy|moira|samantha|victoria|tessa|ava|zira|hazel|heather|helen|jessa|linda|rosa|susan|veena|yuri|aria|jenny/i.test(n);
  const fems = list.filter(v => isF(v.name));
  let v;
  v = fems.find(x => x.lang.startsWith('en-AU')); if (v) return v;
  v = fems.find(x => x.lang.startsWith('en-GB')); if (v) return v;
  v = fems.find(x => x.lang.startsWith('en')); if (v) return v;
  v = list.find(x => x.lang.startsWith('en-AU')); if (v) return v;
  v = list.find(x => x.lang.startsWith('en-GB')); if (v) return v;
  return null;
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const parts = text.match(/[^.!?]+[.!?]*/g) || [text];
  let idx = 0;
  let voiceInfo = null;

  function speakNext() {
    if (idx >= parts.length) { setSpeaking(false); return; }
    const u = new SpeechSynthesisUtterance(parts[idx].trim());
    u.rate = 0.88;
    u.pitch = 1.25 + (Math.sin(idx * 1.7) * 0.06);
    const voice = findVoice();
    if (voice) { u.voice = voice; if (!voiceInfo) voiceInfo = voice.name + ' ' + voice.lang; }
    u.onstart = () => setSpeaking(true);
    u.onend = () => {
      idx++;
      const p = parts[idx - 1].trim();
      const pause = /[,;:]$/.test(p) ? 180 : /[.!?]$/.test(p) ? 350 : 100;
      setTimeout(speakNext, pause);
    };
    u.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(u);
  }
  speakNext();
}

async function processChatLoop() {
  let done = false, loopCount = 0, finalContent = '';
  while (!done && loopCount < 10) {
    loopCount++;
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    if (data.error) { stopThinking(); setStatus('ERR: ' + data.error.slice(0, 60)); return null; }
    if (data.type === 'tool_call') {
      history.push({ role: 'assistant', content: data.content || null, tool_calls: data.tool_calls });
      saveHistory();
      for (const tc of data.tool_calls) {
        setStatus('AI: ' + tc.function.name);
        const result = await executeToolCall(tc);
        history.push({ role: 'tool', tool_call_id: tc.id, content: JSON.stringify(result) });
        saveHistory();
      }
    } else { done = true; finalContent = data.content; }
  }
  if (loopCount >= 10) { setStatus('MAX TOOL CALLS'); finalContent = finalContent || 'Max tool calls reached.'; }
  return finalContent;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (text.toUpperCase() === 'EXPORT') {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(history))));
    const full = 'MEMORY:' + encoded;
    try { await navigator.clipboard.writeText(full); setStatus('EXPORTED'); }
    catch (e) { input.value = full; input.select(); setStatus('COPY MANUALLY'); }
    return;
  }

  const memMatch = text.match(/^MEMORY:(.+)/i);
  if (memMatch) {
    try {
      const decoded = JSON.parse(decodeURIComponent(escape(atob(memMatch[1].trim()))));
      if (Array.isArray(decoded) && decoded.length) { history = decoded; saveHistory(); setStatus('RESTORED'); }
      else { setStatus('EMPTY'); }
    } catch (e) { setStatus('INVALID'); }
    return;
  }

  setStatus('...');
  startThinking();
  history.push({ role: 'user', content: text });
  saveHistory();

  try {
    const content = await processChatLoop();
    stopThinking();
    if (content) {
      history.push({ role: 'assistant', content });
      saveHistory();
      setStatus('READY');
      happyReaction();
      setTimeout(() => speak(content), 300);
    }
  } catch (e) {
    stopThinking();
    setStatus('CONNECTION ERROR');
  }
}

function resetConversation() {
  if (!confirm('Are you sure you want to reset the conversation? This will clear all history.')) return;
  history = [];
  localStorage.removeItem('alfi_history');
  saveHistory();
  window.speechSynthesis.cancel();
  setSpeaking(false);
  setStatus('READY');
  input.focus();
}

      if (!('bluetooth' in navigator)) return { success: false, error: 'Web Bluetooth not supported on this browser. Use Chrome or the native mobile app.' };

    }
  }

class TVController {
  constructor() {
    this.tvs = JSON.parse(localStorage.getItem('alfi_tvs') || '[]');
    this.currentId = localStorage.getItem('alfi_current_tv') || null;
    this.currentTv = this.tvs.find(t => t.id === this.currentId) || null;
  }

  save() {
    localStorage.setItem('alfi_tvs', JSON.stringify(this.tvs));
  }

  addTv(brand, ip, name) {
    const tv = { id: crypto.randomUUID(), brand: brand.toLowerCase(), ip, name };
    this.tvs.push(tv);
    this.save();
    this.selectTv(tv.id);
    return tv;
  }

  removeTv(id) {
    this.tvs = this.tvs.filter(t => t.id !== id);
    this.save();
    if (this.currentId === id) {
      this.currentId = null;
      this.currentTv = null;
      localStorage.removeItem('alfi_current_tv');
    }
  }

  selectTv(id) {
    this.currentId = id;
    this.currentTv = this.tvs.find(t => t.id === id) || null;
    localStorage.setItem('alfi_current_tv', id || '');
  }

  getCurrent() {
    return this.currentTv;
  }

  async sendRoku(ip, key) {
    try {
      const res = await fetch(`http://${ip}:8060/keypress/${key}`, { method: 'POST', mode: 'no-cors' });
      return { success: true };
    } catch (e) {
      return { success: false, error: 'Roku not reachable at ' + ip };
    }
  }


  async _connectWeb() {
    if (!this.device) return { success: false, error: 'No device selected' };
    try {
      this.server = await this.device.gatt.connect();
      this.connected = true;
      const services = await this.server.getPrimaryServices();
      let foundChar = null;
      for (const service of services) {
        const chars = await service.getCharacteristics();
        for (const char of chars) {
          if (char.properties.write || char.properties.writeWithoutResponse) { foundChar = char; break; }
        }
        if (foundChar) break;
      }
      this.characteristic = foundChar;
      updateTVStatusBar(); updateTVRemoteUI();
      return { success: true, device: this.deviceName, characteristic_found: !!foundChar, characteristic_uuid: foundChar ? foundChar.uuid : null };
    } catch (e) { this.connected = false; return { success: false, error: e.message }; }
  }

  async _scanNative() {
    try {
      await this.blePlugin.initialize();
      this._discoveredDevices = [];
      showDiscoveredDevices([]);
      await this.blePlugin.startScanning(
        { services: [], allowDuplicates: false },
        (result) => {
          const name = result.localName || result.name || '';
          if (!name) return;
          if (!this._discoveredDevices.find(d => d.deviceId === result.deviceId)) {
            this._discoveredDevices.push({ deviceId: result.deviceId, name, rssi: result.rssi });
            showDiscoveredDevices(this._discoveredDevices);
          }
        }
      );
      return new Promise((resolve) => {
        this._nativeScanTimer = setTimeout(async () => {
          try { await this.blePlugin.stopScanning(); } catch (e) {}
          hideDiscoveredDevices();
          if (this._discoveredDevices.length === 0) resolve({ success: false, error: 'No devices found. Make sure your TV is discoverable.' });
          else resolve({ success: false, action_required: 'select_device', message: 'Tap a device in the list to connect.' });
        }, 8000);
      });
    } catch (e) { return { success: false, error: e.message }; }
  }

  async connectToDevice(deviceId, name) {
    if (this.isNative) return this._connectNative(deviceId, name);
    return this._connectWeb();
  }

  async _connectNative(deviceId, name) {
    try {
      await this.blePlugin.connect({ deviceId });
      this.device = deviceId; this.deviceName = name; this.connected = true;
      const svcResult = await this.blePlugin.getServices({ deviceId });
      let foundChar = null;
      for (const svc of svcResult.services || []) {
        for (const ch of svc.characteristics || []) {
          if (ch.properties?.includes('write') || ch.properties?.includes('writeWithoutResponse')) {
            foundChar = { service: svc.service, characteristic: ch.characteristic };
            break;
          }
        }
        if (foundChar) break;
      }
      this.characteristic = foundChar;
      updateTVStatusBar(); updateTVRemoteUI();
      return { success: true, device: name, characteristic_found: !!foundChar };
    } catch (e) { this.connected = false; return { success: false, error: e.message }; }
  }

  async sendBLECommand(action) {
    if (!this.connected) return { success: false, error: 'TV not connected' };
    if (this.isNative) return this._sendNative(action);
    return this._sendWeb(action);
  }

  async _sendWeb(action) {
    if (!this.characteristic) return { success: false, error: 'No writable characteristic found' };
    const encoder = new TextEncoder();
    const attempts = [
      encoder.encode('KEY_' + action.toUpperCase()),
      new Uint8Array([this.getKeyCode(action)]),
      encoder.encode(action)
    ];
    for (const data of attempts) {
      try {
        if (this.characteristic.properties.write) await this.characteristic.writeValue(data);
        else if (this.characteristic.properties.writeWithoutResponse) await this.characteristic.writeValueWithoutResponse(data);
        return { success: true, action };
      } catch (e) { continue; }
    }
    return { success: false, error: 'Failed to write to characteristic' };
  }

  async _sendNative(action) {
    if (!this.characteristic) return { success: false, error: 'No writable characteristic found' };
    const payload = 'KEY_' + action.toUpperCase();
    const bytes = new TextEncoder().encode(payload);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    const base64 = btoa(binary);
    try {
      await this.blePlugin.write({
        deviceId: this.device, service: this.characteristic.service,
        characteristic: this.characteristic.characteristic, value: base64
      });
      return { success: true, action };
    } catch (e) { return { success: false, error: e.message }; }
  }

  async disconnect() {
    if (this.isNative) return this._disconnectNative();
    return this._disconnectWeb();
  }

  async _disconnectWeb() {
    try { if (this.device && this.device.gatt) this.device.gatt.disconnect(); } catch (e) {}
    this.connected = false; this.server = null; this.characteristic = null;
    this.device = null; this.deviceName = '';
    updateTVStatusBar(); updateTVRemoteUI();
    return { success: true };
  }

  async _disconnectNative() {
    try { if (this.device) await this.blePlugin.disconnect({ deviceId: this.device }); } catch (e) {}
    if (this._nativeScanTimer) { clearTimeout(this._nativeScanTimer); this._nativeScanTimer = null; }
    this.connected = false; this.server = null; this.characteristic = null;
    this.device = null; this.deviceName = '';
    updateTVStatusBar(); updateTVRemoteUI();
    return { success: true };
  }

  getKeyCode(action) {
    const map = {
      toggle_power:0x30, power_on:0x30, power_off:0x30,
      volume_up:0x80, volume_down:0x81, mute:0x7F,
      channel_up:0x9C, channel_down:0x9D,
      home:0x223, back:0x224, menu:0x225, exit:0x22A,
      up:0x52, down:0x51, left:0x50, right:0x4F, select:0x28,
      play:0xB0, pause:0xB1, stop:0xB7, rewind:0xB4, fast_forward:0xB3, record:0xB2
    };
    return map[action] || 0x00;
  }

  getStatus() {
    return { connected: this.connected, device_name: this.deviceName || null };
  }

  async sendSamsung(ip, key) {
    const mapped = SAMSUNG_KEYS[key] || key;
    const useWss = location.protocol === 'https:';
    const ports = [8002, 8001];
    const name = encodeURIComponent('Alf-I');
    for (const port of ports) {
      try {
        const result = await new Promise(resolve => {
          const proto = useWss ? 'wss' : 'ws';
          const url = `${proto}://${ip}:${port}/api/v2/channels/samsung.remote.control?name=${name}`;
          const ws = new WebSocket(url);
          const timer = setTimeout(() => { ws.close(); resolve({ success: false, error: 'Timeout' }); }, 3000);
          ws.onopen = () => {
            ws.send(JSON.stringify({
              method: 'ms.remote.control',
              params: { Cmd: 'Click', DataOfCmd: mapped, Option: 'false', TypeOfRemote: 'SendRemoteKey' }
            }));
            clearTimeout(timer);
            setTimeout(() => { ws.close(); resolve({ success: true }); }, 300);
          };
          ws.onerror = () => { clearTimeout(timer); resolve({ success: false, error: 'Connection failed' }); };
        });
        if (result.success) return result;
      } catch (_) {}
    }
    return { success: false, error: 'Samsung TV unreachable' };
  }

  async sendLg(ip, key) {
    const mapped = LG_KEYS[key] || key;
    const useWss = location.protocol === 'https:';
    const ports = [3000];
    for (const port of ports) {
      try {
        const result = await new Promise(resolve => {
          const proto = useWss ? 'wss' : 'ws';
          const ws = new WebSocket(`${proto}://${ip}:${port}/`);
          const timer = setTimeout(() => { ws.close(); resolve({ success: false, error: 'Timeout' }); }, 5000);
          ws.onopen = () => {
            ws.send(JSON.stringify({
              type: 'register',
              payload: {
                forcePairing: false, pairingType: 'PROMPT',
                manifest: {
                  manifestVersion: 1, appVersion: '1.1',
                  signed: {
                    created: '20250101', appId: 'com.alfi.remote', vendorId: 'alfi',
                    localizedAppNames: { '': 'Alf-I Remote' },
                    localizedVendorNames: { '': 'Alf-I' },
                    permissions: ['LAUNCH','CONTROL_INPUT_TEXT','CONTROL_MOUSE_AND_KEYBOARD','CONTROL_AUDIO','CONTROL_POWER'],
                    serial: 'alfi001'
                  },
                  permissions: ['LAUNCH','CONTROL_INPUT_TEXT','CONTROL_MOUSE_AND_KEYBOARD','CONTROL_AUDIO','CONTROL_POWER']
                }
              }
            }));
          };
          ws.onmessage = () => {
            ws.send(JSON.stringify({ type: 'button', action: 'click', name: mapped }));
            clearTimeout(timer);
            setTimeout(() => { ws.close(); resolve({ success: true }); }, 300);
          };
          ws.onerror = () => { clearTimeout(timer); resolve({ success: false, error: 'Connection failed' }); };
        });
        if (result.success) return result;
      } catch (_) {}
    }
    return { success: false, error: 'LG TV unreachable' };
  }

  async sendCommand(brand, ip, key) {
    switch (brand) {
      case 'roku': return this.sendRoku(ip, key);
      case 'samsung': return this.sendSamsung(ip, key);

  async handleAICommand(cmd) {

    if (!key) return { success: false, error: 'Unknown action' };
    try {
      this.ws.send(JSON.stringify({ method:'ms.remote.control', params:{ Cmd:'Click', DataOfCmd:key, Option:'false', TypeOfRemote:'SendRemoteKey' } }));
      return { success: true, action };
    } catch (e) { return { success: false, error: e.message }; }
  }

  _sendLG(action) {
    const uriMap = {
      toggle_power:'ssap://system/turnOff', power_off:'ssap://system/turnOff',
      volume_up:'ssap://audio/volumeUp', volume_down:'ssap://audio/volumeDown', mute:'ssap://audio/setMute',
      home:'ssap://system.launcher/open', back:'ssap://system/back',
      play:'ssap://media.controls/play', pause:'ssap://media.controls/pause',
      stop:'ssap://media.controls/stop', rewind:'ssap://media.controls/rewind',
      fast_forward:'ssap://media.controls/fastForward',
      netflix:'ssap://system.launcher/launch?appId=netflix', youtube:'ssap://system.launcher/launch?appId=youtube.leanback.v4'
    };
    const uri = uriMap[action];
    if (!uri) return { success: false, error: 'Action not supported on LG' };
    try {
      this.ws.send(JSON.stringify({ type:'request', uri, payload:{} }));
      return { success: true, action };
    } catch (e) { return { success: false, error: e.message }; }
  }

  async _sendRoku(action) {
    const keyMap = {
      toggle_power:'PowerOff', power_off:'PowerOff',
      volume_up:'VolumeUp', volume_down:'VolumeDown', mute:'VolumeMute',
      home:'Home', back:'Back', menu:'Info',
      up:'Up', down:'Down', left:'Left', right:'Right', select:'Select',
      play:'Play', pause:'Play', stop:'Stop',
      rewind:'Rewind', fast_forward:'FastForward',
      netflix:'Netflix', youtube:'YouTube',
      hdmi1:'InputHDMI1', hdmi2:'InputHDMI2', hdmi3:'InputHDMI3', tv_mode:'InputTuner'
    };
    const key = keyMap[action];
    if (!key) return { success: false, error: 'Unknown action' };
    try {
      const res = await fetch('http://' + this.ip + ':8060/keypress/' + key, { method:'POST' });
      return { success: res.ok, action };
    } catch (e) { return { success: false, error: e.message }; }
  }

  disconnect() {
    if (this.ws) { try { this.ws.close(); } catch (e) {} this.ws = null; }
    this.connected = false; this.ip = ''; this.deviceName = '';
  }

  getStatus() {
    return { connected: this.connected, device_name: this.ip + ' (' + this.brand.toUpperCase() + ')', brand: this.brand, ip: this.ip };
  }

  _onStatusChange() {
    updateTVStatusBar();
    updateTVRemoteUI();
  }
}

const tvNetwork = new NetworkTVControl();

function updateTVStatusBar() {
  const el = document.getElementById('tv-status-text');
  if (!el) return;
  if (tvNetwork.connected) { el.textContent = tvNetwork.deviceName; el.className = 'connected'; }
  else if (tvRemote.connected) { el.textContent = tvRemote.deviceName; el.className = 'connected'; }
  else if (tvRemote.device) { el.textContent = 'Tap to connect'; el.className = ''; }
  else { el.textContent = 'No TV Connected'; el.className = ''; }
}

function updateTVRemoteUI() {
  const dot = document.getElementById('tv-dot');
  const name = document.getElementById('tv-device-name');
  if (!dot || !name) return;
  const scanBtn = document.getElementById('tv-scan-btn');
  const discoverBtn = document.getElementById('tv-discover-btn');
  const discBtn = document.getElementById('tv-disconnect-btn');
  const ctrls = document.getElementById('tv-remote-controls');
  const noConn = document.getElementById('tv-no-connection');
  const showBtn = (btn, show) => { if (btn) btn.style.display = show ? 'inline-block' : 'none'; };
  const connected = tvNetwork.connected || tvRemote.connected;
  if (connected) {
    dot.className = 'tv-dot connected';
    name.textContent = tvNetwork.connected ? tvNetwork.deviceName : tvRemote.deviceName;
    showBtn(scanBtn, false); showBtn(discoverBtn, false); showBtn(discBtn, true);
    if (ctrls) ctrls.style.display = 'block'; if (noConn) noConn.style.display = 'none';
  } else if (tvRemote.device) {
    dot.className = 'tv-dot';
    name.textContent = tvRemote.deviceName + ' (disconnected)';
    showBtn(scanBtn, false); showBtn(discoverBtn, false); showBtn(discBtn, true);
    if (ctrls) ctrls.style.display = 'none'; if (noConn) { noConn.style.display = 'block'; noConn.textContent = 'Disconnected. Tap Disconnect to remove.'; }
  } else {
    dot.className = 'tv-dot';
    name.textContent = 'Not connected';
    showBtn(scanBtn, true); showBtn(discoverBtn, true); showBtn(discBtn, false);
    if (ctrls) ctrls.style.display = 'none'; if (noConn) { noConn.style.display = 'block'; noConn.textContent = 'Tap Discover to auto-find TVs on your network, or use BLE for Bluetooth.'; }
  }
}

async function scanForTV() {
  const r = await tvRemote.scan();
  if (!r.success && r.error) setStatus('TV: ' + r.error);
}

async function disconnectTV() {
  if (tvNetwork.connected) { tvNetwork.disconnect(); tvConnectionMode = null; }
  if (tvRemote.connected) await tvRemote.disconnect();
  tvConnectionMode = null;
  const dr = document.getElementById('tv-discover-results');
  if (dr) dr.style.display = 'none';
  updateTVStatusBar(); updateTVRemoteUI();
  setStatus('DISCONNECTED');
}

async function sendTVCommand(action) {
  if (tvNetwork.connected) {
    setStatus('TV: ' + action);
    const r = await tvNetwork.sendCommand(action);
    if (!r.success) setStatus('TV ERR: ' + (r.error || 'failed'));
    else setTimeout(() => setStatus('READY'), 800);
  } else if (tvRemote.connected) {
    setStatus('TV: ' + action);
    const r = await tvRemote.sendCommand(action);
    if (!r.success) setStatus('TV ERR: ' + (r.error || 'failed'));
    else setTimeout(() => setStatus('READY'), 800);
  } else {
    setStatus('TV NOT CONNECTED');
  }
}

async function getLocalIP() {
  return new Promise((resolve) => {
    try {
      const pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      pc.createOffer().then(o => pc.setLocalDescription(o));
      pc.onicecandidate = (e) => {
        if (!e || !e.candidate) return;
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
        if (m && (m[1].startsWith('192.168.') || m[1].startsWith('10.') || m[1].startsWith('172.'))) {
          pc.close(); resolve(m[1]);
        }
      };
      setTimeout(() => { try { pc.close(); } catch(e) {} resolve(null); }, 1500);
    } catch (e) { resolve(null); }
  });
}

async function discoverTVs() {
  setStatus('SCANNING...');
  const section = document.getElementById('tv-discover-results');
  const list = document.getElementById('tv-discovered-list');
  const manual = document.getElementById('tv-discover-manual');
  if (!section || !list) return;
  manual.style.display = 'none';
  section.style.display = 'block';
  list.innerHTML = '<div style="text-align:center;padding:10px;color:rgba(255,255,255,0.3);font-size:12px">Scanning network...</div>';

  let subnet = null;
  const localIP = await getLocalIP();
  if (localIP) { const p = localIP.split('.'); subnet = p[0] + '.' + p[1] + '.' + p[2]; }

  const subnets = subnet ? [subnet] : ['192.168.0', '192.168.1', '10.0.0'];
  const found = []; const seen = new Set();

  for (const sn of subnets) {
    const ips = [];
    for (let i = 1; i <= 254; i++) ips.push(sn + '.' + i);
    for (let s = 0; s < ips.length; s += 20) {
      const results = await Promise.all(ips.slice(s, s + 20).map(ip => probeTV(ip)));
      for (const r of results) {
        if (r && !seen.has(r.ip)) { seen.add(r.ip); found.push(r); updateDiscoverList(found); }
      }
    }
    if (found.length > 0) break;
  }

  if (found.length === 0) {
    setStatus('NO TVS FOUND');
    list.innerHTML = '<div style="text-align:center;padding:16px;color:rgba(255,255,255,0.3);font-size:12px">No TVs found on your network.</div>';
    manual.style.display = 'block';
  }
}

function trySamsung(ip) {
  return new Promise((resolve) => {
    try {
      const ws = new WebSocket('ws://' + ip + ':8002/api/v2/channels/samsung.remote.control?name=' + btoa('Alf-I'));
      const t = setTimeout(() => { try { ws.close(); } catch(e) {} resolve(null); }, 300);
      ws.onopen = () => { clearTimeout(t); try { ws.close(); } catch(e) {} resolve({ ip, brand:'samsung', name:'Samsung (' + ip + ')' }); };
      ws.onerror = () => { clearTimeout(t); resolve(null); };
    } catch (e) { resolve(null); }
  });
}

async function tryRoku(ip) {
  try {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), 200);
    const res = await fetch('http://' + ip + ':8060/', { method:'HEAD', signal: c.signal, mode:'no-cors' });
    clearTimeout(t);
    return { ip, brand:'roku', name:'Roku (' + ip + ')' };
  } catch (e) { return null; }
}

function tryLG(ip) {
  return new Promise((resolve) => {
    try {
      const ws = new WebSocket('ws://' + ip + ':3000/');
      const t = setTimeout(() => { try { ws.close(); } catch(e) {} resolve(null); }, 300);
      ws.onopen = () => { clearTimeout(t); try { ws.close(); } catch(e) {} resolve({ ip, brand:'lg', name:'LG (' + ip + ')' }); };
      ws.onerror = () => { clearTimeout(t); resolve(null); };
    } catch (e) { resolve(null); }
  });
}

async function probeTV(ip) {
  const s = await trySamsung(ip); if (s) return s;
  const r = await tryRoku(ip); if (r) return r;
  const l = await tryLG(ip); if (l) return l;
  return null;
}

function updateDiscoverList(devices) {
  const list = document.getElementById('tv-discovered-list');
  if (!list) return;
  list.innerHTML = devices.map(d =>
    '<button class="device-btn" onclick="connectNetworkTV(\'' + d.ip + '\',\'' + d.brand + '\',\'' + d.name.replace(/'/g,"\\'") + '\')">' +
      '<svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>' +
      '<span class="name">' + d.name + '</span>' +
      '<span style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.5px">' + d.brand.toUpperCase() + '</span>' +
    '</button>'
  ).join('');
}

async function connectNetworkTV(ip, brand) {
  setStatus('CONNECTING...');
  document.getElementById('tv-discover-results').style.display = 'none';
  const r = await tvNetwork.connect(ip, brand);
  if (r.success) {
    tvConnectionMode = 'network';
    updateTVStatusBar(); updateTVRemoteUI();
    setStatus('READY');
  } else {
    setStatus('NET ERR: ' + (r.error || 'failed'));
  }
}

function connectManualTV() {
  const ip = document.getElementById('tv-manual-ip').value.trim();
  if (!ip) { setStatus('ENTER IP'); return; }
  const brand = document.getElementById('tv-manual-brand').value;
  connectNetworkTV(ip, brand);
}

function showDiscoveredDevices(devices) {
  const container = document.getElementById('tv-device-list');
  const section = document.getElementById('tv-scan-results');
  if (!container || !section) return;
  section.style.display = 'block';
  if (devices.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:10px;color:rgba(255,255,255,0.3);font-size:12px">Scanning...</div>';
    return;
  }
  container.innerHTML = devices.map(d =>
    '<button class="device-btn" onclick="selectNativeDevice(\'' + d.deviceId + '\',\'' + d.name.replace(/'/g,"\\'") + '\')">' +
      '<svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>' +
      '<span class="name">' + d.name + '</span>' +
      '<span class="signal">' + (d.rssi > -60 ? '&#9679;' : '&#9675;') + '</span>' +
    '</button>'
  ).join('');
}

function hideDiscoveredDevices() {
  const section = document.getElementById('tv-scan-results');
  if (section) section.style.display = 'none';
}

async function selectNativeDevice(deviceId, name) {
  setStatus('CONNECTING...');
  hideDiscoveredDevices();
  const result = await tvRemote.connectToDevice(deviceId, name);
  if (!result.success) setStatus('TV ERR: ' + (result.error || 'connection failed'));
  else setStatus('READY');
}

async function executeToolCall(tc) {
  const name = tc.function.name;
  let args = {};
  try { args = JSON.parse(tc.function.arguments); } catch (e) {}
  switch (name) {
    case 'connect_tv':
      if (tvController.getCurrent()) {
        return { success: true, already_connected: true, device: tvController.getCurrent().name };
      }
      if (tvController.tvs.length === 0) {
        if (!drawerOpen) toggleTVDrawer();
        return { success: false, action_required: 'add_tv', message: 'Open the TV Remote panel and add your TV by IP.' };
      }
      if (!drawerOpen) toggleTVDrawer();
      return { success: false, action_required: 'select_tv', message: 'Select a TV from the Remote panel.' };
    case 'disconnect_tv':
      tvController.selectTv(null);
      return { success: true, message: 'TV disconnected' };
    case 'tv_status':
      if (tvController.getCurrent()) return { connected: true, device_name: tvController.getCurrent().name, brand: tvController.getCurrent().brand, ip: tvController.getCurrent().ip };
      return { connected: false };
    case 'control_tv':
      if (tvController.getCurrent()) {
        const actionToKey = {power_on:'PowerOn',power_off:'PowerOff',toggle_power:'PowerOff',volume_up:'VolumeUp',volume_down:'VolumeDown',mute:'Mute',unmute:'Mute',channel_up:'ChannelUp',channel_down:'ChannelDown',home:'Home',back:'Back',menu:'Menu',exit:'Exit',up:'Up',down:'Down',left:'Left',right:'Right',select:'Select',play:'Play',pause:'Pause',stop:'Stop',rewind:'Rev',fast_forward:'Fwd',record:'Record',netflix:'Netflix',youtube:'YouTube',prime_video:'PrimeVideo',disney_plus:'Netflix',hdmi1:'Input',hdmi2:'Input',hdmi3:'Input',av:'Input',tv_mode:'Input',input:'Input'};
        const key = args.key || actionToKey[args.action] || args.action;
        return await tvController.sendCommand(tvController.getCurrent().brand, tvController.getCurrent().ip, key);
      }
      return { success: false, error: 'No TV connected. Add a TV in the Remote panel.' };
    default:
      return { error: 'Unknown function: ' + name };
  }
}

const tvController = new TVController();
const tvDrawer = document.getElementById('tv-drawer');
const tvSelect = document.getElementById('tv-select');
const tvBtn = document.getElementById('tv-drawer-toggle');
const tvRemoveBtn = document.getElementById('tv-remove-btn');
const tvFeedback = document.getElementById('tv-feedback');

let drawerOpen = false;

function toggleTVDrawer() {
  drawerOpen = !drawerOpen;
  tvDrawer.classList.toggle('open', drawerOpen);
  tvBtn.classList.toggle('active', drawerOpen);
  faceContainer.classList.toggle('drawer-open', drawerOpen);
  if (drawerOpen) populateTvSelect();
}

function populateTvSelect() {
  const current = tvController.getCurrent();
  tvSelect.innerHTML = '<option value="">-- No TV selected --</option>';
  tvController.tvs.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.name} (${t.brand})`;
    if (current && t.id === current.id) opt.selected = true;
    tvSelect.appendChild(opt);
  });
  tvRemoveBtn.style.display = current ? 'inline-block' : 'none';
}

function onTvSelect() {
  const id = tvSelect.value;
  tvController.selectTv(id || null);
  tvRemoveBtn.style.display = id ? 'inline-block' : 'none';
  if (!id) tvFeedback.textContent = '';
}

function removeTv() {
  const tv = tvController.getCurrent();
  if (!tv) return;
  if (!confirm(`Remove ${tv.name}?`)) return;
  tvController.removeTv(tv.id);
  populateTvSelect();
  tvFeedback.textContent = 'TV removed';
}

async function tvSend(key) {
  const tv = tvController.getCurrent();
  if (!tv) { tvFeedback.textContent = 'Select a TV first'; return; }

  tvFeedback.textContent = `Sending ${key}...`;
  const result = await tvController.sendCommand(tv.brand, tv.ip, key);
  tvFeedback.textContent = result.success
    ? `${key} sent to ${tv.name}`
    : `Failed: ${result.error}`;
  tvFeedback.style.color = result.success ? 'rgba(102,187,106,0.6)' : 'rgba(239,83,80,0.6)';
  setTimeout(() => { tvFeedback.textContent = ''; tvFeedback.style.color = ''; }, 3000);
}

function showAddTvModal() {
  document.getElementById('tv-modal-overlay').classList.add('open');
  document.getElementById('tv-scan-result').innerHTML = '';
  document.getElementById('tv-ip-input').focus();
}

function hideAddTvModal() {
  document.getElementById('tv-modal-overlay').classList.remove('open');
}

function saveTv() {
  const name = document.getElementById('tv-name-input').value.trim();
  const ip = document.getElementById('tv-ip-input').value.trim();
  const brand = document.getElementById('tv-brand-input').value;
  if (!name || !ip) { alert('Name and IP required'); return; }

  tvController.addTv(brand, ip, name);
  hideAddTvModal();
  populateTvSelect();
  if (!drawerOpen) toggleTVDrawer();
  tvFeedback.textContent = `${name} added`;
  setTimeout(() => { tvFeedback.textContent = ''; }, 2000);
}

async function scanTvs() {
  const scanResult = document.getElementById('tv-scan-result');
  scanResult.innerHTML = 'Scanning network for TVs...';

  let localIp = await getLocalIP();
  let subnet = null;
  if (localIp) { const p = localIp.split('.'); subnet = p[0] + '.' + p[1] + '.' + p[2]; }
  const subnets = subnet ? [subnet] : ['192.168.0', '192.168.1', '10.0.0'];
  const found = []; const seen = new Set();

  for (const sn of subnets) {
    const ips = [];
    for (let i = 1; i <= 254; i++) ips.push(sn + '.' + i);
    for (let s = 0; s < ips.length; s += 15) {
      const results = await Promise.all(ips.slice(s, s + 15).map(ip => probeTV(ip)));
      for (const r of results) {
        if (r && !seen.has(r.ip)) { seen.add(r.ip); found.push(r); }
      }
      if (found.length > 0) break;
    }
    if (found.length > 0) break;
  }

  if (found.length > 0) {
    scanResult.innerHTML = found.map(t =>
      `<div class="found" style="cursor:pointer" onclick="document.getElementById('tv-ip-input').value='${t.ip}';document.getElementById('tv-brand-input').value='${t.brand}'">Found: ${t.brand.toUpperCase()} ${t.name} at ${t.ip} (click to select)</div>`
    ).join('');
    document.getElementById('tv-ip-input').value = found[0].ip;
    document.getElementById('tv-brand-input').value = found[0].brand;
  } else {
    scanResult.innerHTML = '<div class="none">No TVs found. Enter IP manually above.</div>';
  }
}

document.getElementById('tv-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) hideAddTvModal();
});
