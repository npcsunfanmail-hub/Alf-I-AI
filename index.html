<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alf-I</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a2e; display: flex; justify-content: center; align-items: center; -webkit-text-size-adjust: 100%; }
  #app { width: 100%; max-width: 500px; height: 100dvh; background: linear-gradient(180deg, #1a1a4e 0%, #0d0d3a 40%, #0a0a2e 100%); display: flex; flex-direction: column; position: relative; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
  #face-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; min-height: 0; }
  #face { width: min(82vw, 380px); aspect-ratio: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: min(4.5vw, 20px); animation: faceIdle 5s ease-in-out infinite; transition: filter 0.6s; }
  @keyframes faceIdle { 0%, 100% { transform: translateY(0px) rotate(0deg); } 25% { transform: translateY(-6px) rotate(1.2deg); } 50% { transform: translateY(-10px) rotate(0deg); } 75% { transform: translateY(-6px) rotate(-1.2deg); } }
  #face.thinking { animation: faceThink 4s ease-in-out infinite; }
  @keyframes faceThink { 0%, 100% { transform: translateY(-3px) rotate(0.5deg); } 50% { transform: translateY(-8px) rotate(-0.5deg); } }

  #brow-group { display: flex; gap: min(16vw, 70px); align-items: center; justify-content: center; width: 100%; }
  .brow { width: min(22vw, 90px); height: min(1.6vw, 7px); background: white; border-radius: min(0.8vw, 3px); transition: transform 0.5s ease; box-shadow: 0 0 16px rgba(255,255,255,0.1); }
  .brow.raise { transform: translateY(-6px); }

  #eye-group { display: flex; gap: min(16vw, 70px); align-items: center; justify-content: center; width: 100%; }
  .eye { width: min(16vw, 68px); height: min(26vw, 110px); background: white; border-radius: min(1.4vw, 6px); position: relative; display: flex; align-items: center; justify-content: center; transition: height 0.1s ease; box-shadow: 0 0 40px rgba(255,255,255,0.1); }
  .eye.blink { height: min(0.8vw, 3px); }
  .eye.widen { height: min(30vw, 120px); transition: height 0.2s ease; }
  .thinking .eye.blink { height: min(0.8vw, 3px); transition: height 0.25s ease; }
  .pupil { width: min(7vw, 30px); height: min(10vw, 42px); background: linear-gradient(135deg, #1a1a4e, #0a0a2e); border-radius: min(0.8vw, 3px); position: relative; transition: transform 0.5s ease; animation: pupilDrift 12s ease-in-out infinite; }
  .pupil::after { content: ''; position: absolute; width: min(2.4vw, 10px); height: min(2.4vw, 10px); background: rgba(255,255,255,0.35); border-radius: 50%; top: min(1.2vw, 5px); right: min(1.2vw, 5px); }
  @keyframes pupilDrift { 0%, 100% { transform: translateX(0px) translateY(0px); } 25% { transform: translateX(-4px) translateY(0px); } 50% { transform: translateX(0px) translateY(-3px); } 75% { transform: translateX(4px) translateY(0px); } }
  .thinking .pupil { animation: pupilThink 3s ease-in-out infinite; }
  @keyframes pupilThink { 0%, 100% { transform: translateX(0px) translateY(-4px); } 50% { transform: translateX(0px) translateY(-8px); } }

  #mouth-area { display: flex; align-items: center; justify-content: center; }
  #mouth { width: min(24vw, 100px); height: min(2vw, 8px); background: white; border-radius: min(0.8vw, 3px); transition: width 0.15s ease, background 0.1s, border 0.1s; box-shadow: 0 0 24px rgba(255,255,255,0.08); }
  #mouth.open { width: min(28vw, 118px); background: #0a0a2e; border: min(0.3vw, 1.5px) solid rgba(255,255,255,0.7); border-radius: min(1.2vw, 5px); }

  #name-label { color: rgba(255,255,255,0.12); font-size: min(2.8vw, 13px); font-weight: 400; letter-spacing: 4px; text-transform: uppercase; margin-top: min(4vw, 18px); pointer-events: none; }
  #status-text { color: rgba(255,255,255,0.4); font-size: min(3.2vw, 14px); text-align: center; padding: min(2vw, 10px); letter-spacing: 1px; }
  #bottom-area { flex-shrink: 0; padding: min(3vw, 14px) min(4vw, 20px) max(env(safe-area-inset-bottom, 8px), min(4vw, 20px)); background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.06); }
  #input-row { display: flex; gap: 6px; align-items: center; background: rgba(255,255,255,0.08); border-radius: 24px; padding: 4px 4px 4px 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  #input { flex: 1; min-width: 0; background: none; border: none; color: white; font-size: 16px; outline: none; padding: 9px 0; }
  #input::placeholder { color: rgba(255,255,255,0.3); }
  .icon-btn { background: none; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
  .icon-btn svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.6); }
  .icon-btn:active { background: rgba(255,255,255,0.15); }
  .icon-btn:active svg { fill: white; }
#voice-btn.listening { background: #ea4335; animation: pulse 1s infinite; }
#voice-btn.listening svg { fill: white; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
#tts-toggle.active svg { fill: #4fc3f7; }
#send-btn svg { fill: #4fc3f7; }
#tv-btn svg { fill: #81c784; }
#tv-btn.active { background: rgba(129, 199, 132, 0.2); }
#tv-btn.connected svg { fill: #4caf50; }
#tv-btn.connected { background: rgba(76, 175, 80, 0.25); animation: tvPulse 2s infinite; }
@keyframes tvPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.3); } 50% { box-shadow: 0 0 0 8px rgba(76, 175, 80, 0); } }

#tv-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 16px; backdrop-filter: blur(4px); }
#tv-modal.open { display: flex; }
#tv-panel { background: #1a1a4e; border-radius: 16px; width: 100%; max-width: 440px; max-height: 85vh; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08); }
#tv-panel h2 { color: white; font-size: 18px; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
#tv-panel h2 svg { width: 22px; height: 22px; fill: #81c784; }
#tv-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 22px; cursor: pointer; padding: 0 4px; }
#tv-close:hover { color: white; }

#tv-scan-btn { background: #4caf50; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 12px; transition: background .2s; }
#tv-scan-btn:hover { background: #43a047; }
#tv-scan-btn:disabled { background: #555; cursor: not-allowed; }
#tv-scan-btn svg { vertical-align: middle; margin-right: 6px; width: 18px; height: 18px; fill: white; }
#tv-scan-btn.scanning { animation: scanPulse 1s infinite; }
@keyframes scanPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

#tv-list { flex: 1; overflow-y: auto; margin: 0 -4px; padding: 0 4px; min-height: 0; }
.tv-item { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; transition: all .2s; }
.tv-item:hover { background: rgba(255,255,255,0.1); }
.tv-item.selected { border-color: #4caf50; background: rgba(76,175,80,0.15); }
.tv-item .tv-name { color: white; font-size: 15px; font-weight: 500; }
.tv-item .tv-ip { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 2px; }
.tv-item .tv-type { display: inline-block; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-top: 4px; text-transform: uppercase; }
#tv-empty { color: rgba(255,255,255,0.3); text-align: center; padding: 40px 0; font-size: 14px; }

#tv-pair-section { display: none; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; margin-top: 12px; }
#tv-pair-section.open { display: block; }
#tv-pair-section label { color: rgba(255,255,255,0.7); font-size: 13px; display: block; margin-bottom: 6px; }
#tv-code-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: white; font-size: 20px; text-align: center; letter-spacing: 4px; outline: none; box-sizing: border-box; }
#tv-code-input:focus { border-color: #4caf50; }
#tv-connect-btn { background: #2196f3; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; transition: background .2s; }
#tv-connect-btn:hover { background: #1e88e5; }
#tv-connect-btn:disabled { background: #555; cursor: not-allowed; }

#tv-status-msg { color: rgba(255,255,255,0.6); font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }
#tv-status-msg.error { color: #ef5350; }
#tv-status-msg.success { color: #4caf50; }

#tv-remote { display: none; }
#tv-remote.open { display: block; }
#tv-disconnect-btn { background: transparent; color: #ef5350; border: 1px solid #ef5350; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; margin-top: 12px; width: 100%; }
#tv-disconnect-btn:hover { background: rgba(239,83,80,0.1); }

.remote-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
.remote-grid button { background: rgba(255,255,255,0.08); border: none; border-radius: 8px; color: white; padding: 12px 8px; font-size: 13px; cursor: pointer; transition: background .15s; }
.remote-grid button:hover { background: rgba(255,255,255,0.18); }
.remote-grid button:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
.remote-grid .r-key { font-size: 18px; }
.remote-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 6px; }
.remote-row button { background: rgba(255,255,255,0.08); border: none; border-radius: 8px; color: white; padding: 10px 4px; font-size: 12px; cursor: pointer; transition: background .15s; }
.remote-row button:hover { background: rgba(255,255,255,0.18); }
.remote-row button:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
.remote-row .r-key { font-size: 16px; }

@media (max-width: 380px) { .remote-grid button, .remote-row button { padding: 8px 4px; font-size: 11px; } }
</style>
</head>
<body>
<div id="app">
  <div id="face-container">
    <div id="face">
      <div id="brow-group">
        <div class="brow" id="left-brow"></div>
        <div class="brow" id="right-brow"></div>
      </div>
      <div id="eye-group">
        <div class="eye" id="left-eye">
          <div class="pupil"></div>
        </div>
        <div class="eye" id="right-eye">
          <div class="pupil"></div>
        </div>
      </div>
      <div id="mouth-area">
        <div id="mouth"></div>
      </div>
      <div id="name-label">ALF-I</div>
    </div>
    <div id="status-text">READY</div>
  </div>
  <div id="bottom-area">
    <div id="input-row">
      <input id="input" type="text" placeholder="Type a message..." autofocus>
      <button class="icon-btn" id="reset-btn" onclick="resetConversation()" title="New conversation">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="icon-btn" id="voice-btn" onclick="toggleVoice()" title="Voice input">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="icon-btn active" id="tts-toggle" onclick="toggleTTS()" title="Voice output">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <button class="icon-btn" id="tv-btn" onclick="toggleTVModal()" title="Connect to TV">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zm-5-6l-7 4V7l7 4z"/></svg>
      </button>
      <button class="icon-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="tv-modal">
  <div id="tv-panel">
    <h2>
      <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zm-5-6l-7 4V7l7 4z"/></svg>
      TV Remote
      <button id="tv-close" onclick="toggleTVModal()">&times;</button>
    </h2>

    <button id="tv-scan-btn" onclick="scanTVs()">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Scan for TVs
    </button>

    <div id="tv-list"><div id="tv-empty">Click "Scan for TVs" to find devices on your network</div></div>

    <div id="tv-pair-section">
      <label>Enter the pairing code shown on your TV</label>
      <input id="tv-code-input" type="text" maxlength="10" placeholder="000000" oninput="this.value=this.value.replace(/[^0-9a-zA-Z]/g,'').toUpperCase()">
      <button id="tv-connect-btn" onclick="pairTV()">Connect</button>
    </div>

    <div id="tv-status-msg"></div>

    <div id="tv-remote">
      <div class="remote-grid">
        <button onclick="tvCommand('source')">SOURCE</button>
        <button onclick="tvCommand('up')"><span class="r-key">&#9650;</span></button>
        <button onclick="tvCommand('mute')">MUTE</button>
        <button onclick="tvCommand('left')"><span class="r-key">&#9664;</span></button>
        <button onclick="tvCommand('enter')">OK</button>
        <button onclick="tvCommand('right')"><span class="r-key">&#9654;</span></button>
        <button onclick="tvCommand('volume_down')">VOL&#9660;</button>
        <button onclick="tvCommand('down')"><span class="r-key">&#9660;</span></button>
        <button onclick="tvCommand('volume_up')">VOL&#9650;</button>
      </div>
      <div class="remote-row">
        <button onclick="tvCommand('power')">POWER</button>
        <button onclick="tvCommand('home')">HOME</button>
        <button onclick="tvCommand('back')">BACK</button>
        <button onclick="tvCommand('menu')">MENU</button>
        <button onclick="tvCommand('info')">INFO</button>
      </div>
      <div class="remote-row">
        <button onclick="tvCommand('play')">PLAY</button>
        <button onclick="tvCommand('pause')">PAUSE</button>
        <button onclick="tvCommand('stop')">STOP</button>
        <button onclick="tvCommand('rewind')">REW</button>
        <button onclick="tvCommand('fastforward')">FF</button>
      </div>
      <div class="remote-row">
        <button onclick="tvCommand('channel_down')">CH&#9660;</button>
        <button onclick="tvCommand('1')">1</button>
        <button onclick="tvCommand('2')">2</button>
        <button onclick="tvCommand('3')">3</button>
        <button onclick="tvCommand('channel_up')">CH&#9650;</button>
      </div>
      <div class="remote-row">
        <button onclick="tvCommand('4')">4</button>
        <button onclick="tvCommand('5')">5</button>
        <button onclick="tvCommand('6')">6</button>
        <button onclick="tvCommand('7')">7</button>
        <button onclick="tvCommand('8')">8</button>
      </div>
      <div class="remote-row">
        <button onclick="tvCommand('9')">9</button>
        <button onclick="tvCommand('0')">0</button>
      </div>
      <button id="tv-disconnect-btn" onclick="disconnectTV()">Disconnect from TV</button>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const statusEl = document.getElementById('status-text');
const voiceBtn = document.getElementById('voice-btn');
const ttsBtn = document.getElementById('tts-toggle');
const mouth = document.getElementById('mouth');
const leftEye = document.getElementById('left-eye');
const rightEye = document.getElementById('right-eye');
const leftBrow = document.getElementById('left-brow');
const rightBrow = document.getElementById('right-brow');

let userId = localStorage.getItem('alfi_user_id') || crypto.randomUUID();
localStorage.setItem('alfi_user_id', userId);
let history = [];

async function loadHistory() {
  try {
    const res = await fetch('/api/sync?user_id=' + encodeURIComponent(userId));
    const data = await res.json();
    if (data.history && data.history.length) {
      history = data.history;
      localStorage.setItem('alfi_history', JSON.stringify(history));
      console.log('Loaded', history.length, 'messages from server for', userId.slice(0, 8) + '...');
    } else {
      const saved = localStorage.getItem('alfi_history');
      if (saved) history = JSON.parse(saved);
      console.log('Server empty, loaded', history.length, 'from localStorage');
    }
  } catch (e) {
    const saved = localStorage.getItem('alfi_history');
    if (saved) history = JSON.parse(saved);
    console.log('Load failed, loaded', history.length, 'from localStorage');
  }
}
loadHistory();
let ttsEnabled = true;
let isListening = false;
let isSpeaking = false;
let isThinking = false;
let recognition = null;
let blinkTimer = null;
let browTimer = null;
let mouthAnimFrame = null;
let mouthStart = 0;

const face = document.getElementById('face');
const pupils = document.querySelectorAll('.pupil');

function blinkEyes() {
  const dur = isThinking ? 250 : 100;
  leftEye.classList.add('blink');
  rightEye.classList.add('blink');
  setTimeout(() => {
    leftEye.classList.remove('blink');
    rightEye.classList.remove('blink');
  }, dur);
  const next = isThinking ? 4000 + Math.random() * 3000 : 2000 + Math.random() * 4000;
  blinkTimer = setTimeout(blinkEyes, next);
}
blinkEyes();

function animateBrows() {
  if (isThinking || isSpeaking) { browTimer = setTimeout(animateBrows, 1000); return; }
  const both = Math.random() > 0.3;
  if (both) { leftBrow.classList.add('raise'); rightBrow.classList.add('raise'); }
  else if (Math.random() > 0.5) leftBrow.classList.add('raise');
  else rightBrow.classList.add('raise');
  setTimeout(() => {
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
  }, 500);
  const next = 2000 + Math.random() * 4000;
  browTimer = setTimeout(animateBrows, next);
}
animateBrows();

function startThinking() {
  isThinking = true;
  face.classList.add('thinking');
  leftBrow.classList.add('raise');
  rightBrow.classList.add('raise');
}

function stopThinking() {
  isThinking = false;
  face.classList.remove('thinking');
  leftBrow.classList.remove('raise');
  rightBrow.classList.remove('raise');
}

function happyReaction() {
  leftEye.classList.add('widen');
  rightEye.classList.add('widen');
  leftBrow.classList.add('raise');
  rightBrow.classList.add('raise');
  setTimeout(() => {
    leftEye.classList.remove('widen');
    rightEye.classList.remove('widen');
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
  }, 600);
}

function startMouthAnimation() {
  mouth.classList.add('open');
  mouthStart = performance.now();

  function step(time) {
    if (!isSpeaking) return;
    const t = (time - mouthStart) / 1000;

    const fSyllable = 4.5 + 1.2 * Math.sin(t * 0.4);
    const fFast = 7 + 2 * Math.sin(t * 0.6 + 0.8);
    const fPhrase = 1.4 + 0.6 * Math.sin(t * 0.25 + 1.5);

    const vowels = Math.abs(Math.sin(t * fSyllable * Math.PI));
    const consonants = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * fFast * Math.PI * 2));
    const phrasing = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * fPhrase * Math.PI * 2));

    let raw = vowels * 0.5 + consonants * 0.2 + phrasing * 0.3;
    raw += Math.sin(t * 14.7 * Math.PI) * 0.04;
    raw += Math.sin(t * 21.3 * Math.PI + 0.6) * 0.03;
    raw += Math.sin(t * 33.1 * Math.PI + 1.8) * 0.02;

    const openness = Math.max(0.08, Math.min(1, raw));
    const minH = 5, maxH = 26;
    const h = minH + openness * (maxH - minH);

    const r = 2 + openness * 4;
    mouth.style.height = h.toFixed(1) + 'px';
    mouth.style.borderRadius = r.toFixed(1) + 'px';
    mouthAnimFrame = requestAnimationFrame(step);
  }
  mouthAnimFrame = requestAnimationFrame(step);
}

function stopMouthAnimation() {
  isSpeaking = false;
  if (mouthAnimFrame) { cancelAnimationFrame(mouthAnimFrame); mouthAnimFrame = null; }
  mouth.classList.remove('open');
  mouth.style.height = '';
  mouth.style.borderRadius = '';
}

function setSpeaking(val) {
  isSpeaking = val;
  if (val) {
    leftBrow.classList.add('raise');
    rightBrow.classList.add('raise');
    startMouthAnimation();
  } else {
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
    stopMouthAnimation();
  }
}

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = function(e) {
    input.value = e.results[0][0].transcript;
    sendMessage();
  };
  recognition.onend = function() { isListening = false; voiceBtn.classList.remove('listening'); };
  recognition.onerror = function() { isListening = false; voiceBtn.classList.remove('listening'); setStatus('VOICE ERROR'); };
}

function toggleVoice() {
  if (!recognition) { setStatus('NOT SUPPORTED'); return; }
  if (isListening) { recognition.stop(); return; }
  isListening = true;
  voiceBtn.classList.add('listening');
  recognition.start();
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsBtn.classList.toggle('active');
}

let voicesCache = [];

function loadVoices() {
  voicesCache = window.speechSynthesis.getVoices();
  console.log('Alf-I available voices:', voicesCache.map(v => v.name + ' [' + v.lang + ']').join(', '));
}
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function findVoice() {
  const vs = window.speechSynthesis.getVoices();
  const list = vs.length ? vs : voicesCache;
  if (!list.length) return null;
  const isF = n => /female|zoe|vanessa|karen|natya|fiona|catherine|serena|tracy|moira|samantha|victoria|tessa|ava|zira|hazel|heather|helen|jessa|linda|rosa|susan|veena|yuri|aria|jenny/i.test(n);
  const fems = list.filter(v => isF(v.name));
  let v;
  v = fems.find(x => x.lang.startsWith('en-AU')); if (v) return v;
  v = fems.find(x => x.lang.startsWith('en-GB')); if (v) return v;
  v = fems.find(x => x.lang.startsWith('en')); if (v) return v;
  v = list.find(x => x.lang.startsWith('en-AU')); if (v) return v;
  v = list.find(x => x.lang.startsWith('en-GB')); if (v) return v;
  return null;
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const parts = text.match(/[^.!?]+[.!?]*/g) || [text];
  let idx = 0;
  let voiceInfo = null;

  function speakNext() {
    if (idx >= parts.length) { setSpeaking(false); return; }
    const u = new SpeechSynthesisUtterance(parts[idx].trim());
    u.rate = 0.88;
    u.pitch = 1.25 + (Math.sin(idx * 1.7) * 0.06);
    const voice = findVoice();
    if (voice) { u.voice = voice; if (!voiceInfo) voiceInfo = voice.name + ' ' + voice.lang; }
    u.onstart = () => setSpeaking(true);
    u.onend = () => {
      idx++;
      const p = parts[idx - 1].trim();
      const pause = /[,;:]$/.test(p) ? 180 : /[.!?]$/.test(p) ? 350 : 100;
      setTimeout(speakNext, pause);
    };
    u.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(u);
  }
  speakNext();
  if (voiceInfo) console.log('Alf-I voice:', voiceInfo);
  else console.log('Alf-I voice: default');
}

function saveHistory() {
  localStorage.setItem('alfi_history', JSON.stringify(history));
  console.log('Saving', history.length, 'messages for user', userId.slice(0, 8) + '...');
  return fetch('/api/sync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: userId, history: history })
  }).catch(() => {});
}

function setStatus(msg) { statusEl.textContent = msg; }

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (text.toUpperCase() === 'EXPORT') {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(history))));
    const full = 'MEMORY:' + encoded;
    try {
      await navigator.clipboard.writeText(full);
      setStatus('COPIED');
    } catch (e) {
      input.value = full;
      input.select();
      setStatus('COPY MANUALLY');
    }
    return;
  }

  const memMatch = text.match(/^MEMORY:(.+)/i);
  if (memMatch) {
    try {
      const decoded = JSON.parse(decodeURIComponent(escape(atob(memMatch[1].trim()))));
      if (Array.isArray(decoded) && decoded.length) {
        history = decoded;
        saveHistory();
        setStatus('RESTORED');
      } else {
        setStatus('EMPTY');
      }
    } catch (e) {
      setStatus('INVALID');
    }
    return;
  }

  setStatus('...');
  startThinking();

  history.push({ role: 'user', content: text });
  saveHistory();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    stopThinking();

    if (data.error) { setStatus('ERR: ' + data.error.slice(0, 60)); return; }

    history.push({ role: 'assistant', content: data.content });
    saveHistory();
    setStatus('READY');
    happyReaction();
    setTimeout(() => speak(data.content), 300);
  } catch (e) {
    stopThinking();
    setStatus('CONNECTION ERROR');
  }
}

function resetConversation() {
  if (!confirm('Are you sure you want to reset the conversation? This will clear all history.')) return;
  history = [];
  localStorage.removeItem('alfi_history');
  saveHistory();
  window.speechSynthesis.cancel();
  setSpeaking(false);
  setStatus('READY');
  input.focus();
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// --- TV Remote Control ---
let selectedTV = null;
let pairedTV = null;

function toggleTVModal() {
  const modal = document.getElementById('tv-modal');
  modal.classList.toggle('open');
  if (!modal.classList.contains('open')) {
    selectedTV = null;
    document.getElementById('tv-list').querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
    document.getElementById('tv-pair-section').classList.remove('open');
  }
}

function setTVStatus(msg, type) {
  const el = document.getElementById('tv-status-msg');
  el.textContent = msg;
  el.className = type || '';
}

async function scanTVs() {
  const btn = document.getElementById('tv-scan-btn');
  const list = document.getElementById('tv-list');
  btn.disabled = true;
  btn.classList.add('scanning');
  btn.textContent = 'Scanning...';
  list.innerHTML = '<div id="tv-empty">Scanning network for TVs...</div>';
  setTVStatus('');

  try {
    const res = await fetch('/api/tv/discover', { method: 'POST' });
    const data = await res.json();
    if (data.error) { setTVStatus(data.error, 'error'); list.innerHTML = '<div id="tv-empty">Error scanning</div>'; return; }
    if (!data.tvs || !data.tvs.length) { list.innerHTML = '<div id="tv-empty">No TVs found. Make sure your TV is on the same WiFi network.</div>'; return; }
    list.innerHTML = '';
    data.tvs.forEach(tv => {
      const el = document.createElement('div');
      el.className = 'tv-item';
      el.innerHTML = '<div class="tv-name">' + (tv.friendly_name || tv.type.toUpperCase() + ' TV') + '</div><div class="tv-ip">' + tv.ip + '</div><div class="tv-type">' + tv.type + '</div>';
      el.onclick = () => selectTV(tv, el);
      list.appendChild(el);
    });
  } catch (e) {
    setTVStatus('Connection error: ' + e.message, 'error');
    list.innerHTML = '<div id="tv-empty">Connection error</div>';
  } finally {
    btn.disabled = false;
    btn.classList.remove('scanning');
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg> Scan for TVs';
  }
}

function selectTV(tv, el) {
  document.getElementById('tv-list').querySelectorAll('.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedTV = tv;
  document.getElementById('tv-pair-section').classList.add('open');
  document.getElementById('tv-code-input').value = '';
  document.getElementById('tv-code-input').focus();
  setTVStatus('Enter the code shown on your ' + tv.type.toUpperCase() + ' TV', '');
}

async function pairTV() {
  if (!selectedTV) return;
  const code = document.getElementById('tv-code-input').value.trim();
  if (!code) { setTVStatus('Please enter the pairing code from your TV', 'error'); return; }
  const btn = document.getElementById('tv-connect-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  setTVStatus('');

  try {
    const res = await fetch('/api/tv/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip: selectedTV.ip, tv_type: selectedTV.type, pairing_code: code })
    });
    const data = await res.json();
    if (data.success) {
      pairedTV = selectedTV;
      setTVStatus('Connected to ' + (pairedTV.friendly_name || pairedTV.type.toUpperCase() + ' TV'), 'success');
      document.getElementById('tv-pair-section').classList.remove('open');
      document.getElementById('tv-remote').classList.add('open');
      document.getElementById('tv-btn').classList.add('connected');
      document.querySelectorAll('.tv-item').forEach(e => e.style.display = 'none');
      document.getElementById('tv-scan-btn').style.display = 'none';
    } else {
      setTVStatus(data.error || 'Pairing failed', 'error');
    }
  } catch (e) {
    setTVStatus('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

async function tvCommand(command) {
  if (!pairedTV) return;
  setTVStatus('Sending: ' + command, '');
  try {
    const res = await fetch('/api/tv/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip: pairedTV.ip, command: command })
    });
    const data = await res.json();
    if (data.success) setTVStatus(command.toUpperCase() + ' sent', 'success');
    else setTVStatus(data.error || 'Command failed', 'error');
  } catch (e) {
    setTVStatus('Error: ' + e.message, 'error');
  }
}

async function disconnectTV() {
  if (!pairedTV) return;
  try {
    await fetch('/api/tv/disconnect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip: pairedTV.ip })
    });
  } catch (e) {}
  pairedTV = null;
  selectedTV = null;
  document.getElementById('tv-remote').classList.remove('open');
  document.getElementById('tv-btn').classList.remove('connected');
  document.getElementById('tv-list').innerHTML = '<div id="tv-empty">Click "Scan for TVs" to find devices on your network</div>';
  document.getElementById('tv-scan-btn').style.display = '';
  document.getElementById('tv-pair-section').classList.remove('open');
  setTVStatus('Disconnected', '');
}

// Check if already paired on modal open
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const modal = document.getElementById('tv-modal');
    if (modal.classList.contains('open')) modal.classList.remove('open');
  }
});
