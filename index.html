<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
  #app { width: 100%; max-width: 800px; height: 100vh; max-height: 900px; background: white; display: flex; flex-direction: column; box-shadow: 0 2px 20px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; margin: 20px; }
  header { background: #1a73e8; color: white; padding: 16px 20px; text-align: center; }
  header h1 { font-size: 18px; font-weight: 600; }
  header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; word-wrap: break-word; animation: fadeIn .2s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 2px; }
  .msg.bot { align-self: flex-start; background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 2px; }
  .msg.bot.typing { background: #f0f2f5; color: #888; font-style: italic; }
  .msg.bot .tool { display: block; font-size: 12px; color: #666; margin-top: 6px; padding-top: 6px; border-top: 1px solid #ddd; }
  #input-area { display: flex; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid #e0e0e0; align-items: center; }
  #input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
  #input:focus { border-color: #1a73e8; }
  #send-btn, #voice-btn, #tts-toggle { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  #send-btn:hover, #voice-btn:hover { background: #e8f0fe; }
  #send-btn svg, #voice-btn svg { width: 20px; height: 20px; fill: #1a73e8; }
  #voice-btn.listening { background: #ea4335; animation: pulse 1s infinite; }
  #voice-btn.listening svg { fill: white; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #tts-toggle { font-size: 14px; color: #666; }
  #tts-toggle.active { color: #1a73e8; }
  #status { font-size: 11px; color: #888; text-align: center; padding: 4px; min-height: 20px; }
  .hidden { display: none !important; }
  @media (max-width: 600px) { #app { margin: 0; border-radius: 0; max-height: none; height: 100vh; } .msg { max-width: 90%; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>AI Assistant</h1>
    <p>Type or use your microphone</p>
  </header>
  <div id="chat"></div>
  <div id="status">Ready</div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type a message..." autofocus>
    <button id="voice-btn" title="Voice input" onclick="toggleVoice()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
    <button id="tts-toggle" class="active" onclick="toggleTTS()" title="Voice output">&#x1f50a;</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const statusEl = document.getElementById('status');
const voiceBtn = document.getElementById('voice-btn');
const ttsBtn = document.getElementById('tts-toggle');

let history = [];
let ttsEnabled = true;
let isListening = false;
let recognition = null;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = function(e) {
    const text = e.results[0][0].transcript;
    input.value = text;
    sendMessage();
  };
  recognition.onend = function() {
    isListening = false;
    voiceBtn.classList.remove('listening');
  };
  recognition.onerror = function() {
    isListening = false;
    voiceBtn.classList.remove('listening');
    setStatus('Voice error');
  };
}

function toggleVoice() {
  if (!recognition) { setStatus('Voice not supported in this browser'); return; }
  if (isListening) {
    recognition.stop();
    isListening = false;
    voiceBtn.classList.remove('listening');
    return;
  }
  isListening = true;
  voiceBtn.classList.add('listening');
  recognition.start();
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsBtn.classList.toggle('active');
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.1;
  u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function addMessage(role, text, toolInfo) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  if (toolInfo) {
    const t = document.createElement('span');
    t.className = 'tool';
    t.textContent = toolInfo;
    el.appendChild(t);
  }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function setStatus(msg) {
  statusEl.textContent = msg;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg bot typing';
  el.id = 'typing-indicator';
  el.textContent = 'Thinking...';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  setStatus('Waiting for response...');
  showTyping();

  history.push({ role: 'user', content: text });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    removeTyping();

    if (data.error) {
      addMessage('bot', 'Error: ' + data.error);
      setStatus('Error');
      return;
    }

    addMessage('bot', data.content);
    history.push({ role: 'assistant', content: data.content });
    setStatus('Ready');
    speak(data.content);
  } catch (e) {
    removeTyping();
    addMessage('bot', 'Error: ' + e.message);
    setStatus('Connection error');
  }
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
