<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alf-I</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a2e; display: flex; justify-content: center; align-items: center; -webkit-text-size-adjust: 100%; }
  #app { width: 100%; max-width: 500px; height: 100dvh; background: linear-gradient(180deg, #1a1a4e 0%, #0d0d3a 40%, #0a0a2e 100%); display: flex; flex-direction: column; position: relative; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
  #face-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; min-height: 0; }
  #face { width: min(82vw, 380px); aspect-ratio: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: min(4.5vw, 20px); animation: faceIdle 5s ease-in-out infinite; transition: filter 0.6s; }
  @keyframes faceIdle { 0%, 100% { transform: translateY(0px) rotate(0deg); } 25% { transform: translateY(-6px) rotate(1.2deg); } 50% { transform: translateY(-10px) rotate(0deg); } 75% { transform: translateY(-6px) rotate(-1.2deg); } }
  #face.thinking { animation: faceThink 4s ease-in-out infinite; }
  @keyframes faceThink { 0%, 100% { transform: translateY(-3px) rotate(0.5deg); } 50% { transform: translateY(-8px) rotate(-0.5deg); } }

  #brow-group { display: flex; gap: min(16vw, 70px); align-items: center; justify-content: center; width: 100%; }
  .brow { width: min(22vw, 90px); height: min(1.6vw, 7px); background: white; border-radius: min(0.8vw, 3px); transition: transform 0.5s ease; box-shadow: 0 0 16px rgba(255,255,255,0.1); }
  .brow.raise { transform: translateY(-6px); }

  #eye-group { display: flex; gap: min(16vw, 70px); align-items: center; justify-content: center; width: 100%; }
  .eye { width: min(16vw, 68px); height: min(26vw, 110px); background: white; border-radius: min(1.4vw, 6px); position: relative; display: flex; align-items: center; justify-content: center; transition: height 0.1s ease; box-shadow: 0 0 40px rgba(255,255,255,0.1); }
  .eye.blink { height: min(0.8vw, 3px); }
  .eye.widen { height: min(30vw, 120px); transition: height 0.2s ease; }
  .thinking .eye.blink { height: min(0.8vw, 3px); transition: height 0.25s ease; }
  .pupil { width: min(7vw, 30px); height: min(10vw, 42px); background: linear-gradient(135deg, #1a1a4e, #0a0a2e); border-radius: min(0.8vw, 3px); position: relative; transition: transform 0.5s ease; animation: pupilDrift 12s ease-in-out infinite; }
  .pupil::after { content: ''; position: absolute; width: min(2.4vw, 10px); height: min(2.4vw, 10px); background: rgba(255,255,255,0.35); border-radius: 50%; top: min(1.2vw, 5px); right: min(1.2vw, 5px); }
  @keyframes pupilDrift { 0%, 100% { transform: translateX(0px) translateY(0px); } 25% { transform: translateX(-4px) translateY(0px); } 50% { transform: translateX(0px) translateY(-3px); } 75% { transform: translateX(4px) translateY(0px); } }
  .thinking .pupil { animation: pupilThink 3s ease-in-out infinite; }
  @keyframes pupilThink { 0%, 100% { transform: translateX(0px) translateY(-4px); } 50% { transform: translateX(0px) translateY(-8px); } }

  #mouth-area { display: flex; align-items: center; justify-content: center; }
  #mouth { width: min(24vw, 100px); height: min(2vw, 8px); background: white; border-radius: min(0.8vw, 3px); transition: width 0.15s ease, background 0.1s, border 0.1s; box-shadow: 0 0 24px rgba(255,255,255,0.08); }
  #mouth.open { width: min(28vw, 118px); background: #0a0a2e; border: min(0.3vw, 1.5px) solid rgba(255,255,255,0.7); border-radius: min(1.2vw, 5px); }

  #name-label { color: rgba(255,255,255,0.12); font-size: min(2.8vw, 13px); font-weight: 400; letter-spacing: 4px; text-transform: uppercase; margin-top: min(4vw, 18px); pointer-events: none; }
  #status-text { color: rgba(255,255,255,0.4); font-size: min(3.2vw, 14px); text-align: center; padding: min(2vw, 10px); letter-spacing: 1px; }
  #bottom-area { flex-shrink: 0; padding: min(3vw, 14px) min(4vw, 20px) max(env(safe-area-inset-bottom, 8px), min(4vw, 20px)); background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.06); }
  #input-row { display: flex; gap: 6px; align-items: center; background: rgba(255,255,255,0.08); border-radius: 24px; padding: 4px 4px 4px 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  #input { flex: 1; min-width: 0; background: none; border: none; color: white; font-size: 16px; outline: none; padding: 9px 0; }
  #input::placeholder { color: rgba(255,255,255,0.3); }
  .icon-btn { background: none; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
  .icon-btn svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.6); }
  .icon-btn:active { background: rgba(255,255,255,0.15); }
  .icon-btn:active svg { fill: white; }
  #voice-btn.listening { background: #ea4335; animation: pulse 1s infinite; }
  #voice-btn.listening svg { fill: white; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #tts-toggle.active svg { fill: #4fc3f7; }
  #send-btn svg { fill: #4fc3f7; }

  #tv-status-bar { display:flex; align-items:center; gap:6px; padding:3px 4px; margin-bottom:1px; border-radius:6px; cursor:pointer; transition:all .15s; font-size:11px; user-select:none; }
  #tv-status-bar:active { background:rgba(255,255,255,0.06); }
  #tv-status-icon { width:16px; height:16px; fill:rgba(255,255,255,0.3); flex-shrink:0; }
  #tv-status-text { color:rgba(255,255,255,0.3); letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #tv-status-text.connected { color:#4fc3f7; }

  #tv-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; opacity:0; pointer-events:none; transition:opacity .3s; }
  #tv-overlay.active { opacity:1; pointer-events:auto; }

  #tv-panel { position:fixed; bottom:0; left:0; right:0; z-index:101; background:linear-gradient(180deg,#1a1a4e,#0d0d3a); border-top:1px solid rgba(255,255,255,0.08); border-radius:16px 16px 0 0; padding:14px 14px max(env(safe-area-inset-bottom,14px),14px); transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); max-height:80dvh; overflow-y:auto; }
  #tv-panel.active { transform:translateY(0); }

  #tv-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.06); }
  #tv-panel-title { color:white; font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; }
  #tv-panel-title svg { width:16px; height:16px; fill:#4fc3f7; }
  #tv-panel-close { background:none; border:none; color:rgba(255,255,255,0.4); font-size:18px; cursor:pointer; padding:2px 6px; line-height:1; }
  #tv-panel-close:active { color:white; }

  #tv-connection-bar { display:flex; align-items:center; gap:6px; margin-bottom:10px; padding:6px 10px; background:rgba(255,255,255,0.04); border-radius:8px; font-size:12px; }
  .tv-dot { width:7px; height:7px; border-radius:50%; background:#555; flex-shrink:0; transition:background .3s; }
  .tv-dot.connected { background:#4caf50; }
  .tv-device-name { color:white; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tv-action { background:rgba(255,255,255,0.08); border:none; color:white; padding:3px 8px; border-radius:5px; font-size:10px; cursor:pointer; flex-shrink:0; }
  .tv-action:active { background:rgba(255,255,255,0.15); }
  .tv-action.scan { background:#4fc3f7; color:#0a0a2e; font-weight:600; }

  .tv-section-label { color:rgba(255,255,255,0.25); font-size:9px; letter-spacing:1.2px; text-transform:uppercase; text-align:center; margin:6px 0 3px; }
  .tv-remote-row { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
  .tv-remote-btn { background:rgba(255,255,255,0.06); border:none; border-radius:8px; color:rgba(255,255,255,0.8); padding:8px 6px; font-size:11px; cursor:pointer; transition:all .1s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1px; min-width:36px; min-height:36px; user-select:none; }
  .tv-remote-btn svg { width:18px; height:18px; fill:rgba(255,255,255,0.6); }
  .tv-remote-btn:active { background:rgba(255,255,255,0.15); transform:scale(0.95); }
  .tv-remote-btn.power { background:rgba(234,67,53,0.2); }
  .tv-remote-btn.power:active { background:rgba(234,67,53,0.35); }
  .tv-remote-btn.power svg { fill:#ea4335; }
  .tv-remote-btn.app { border-radius:8px; font-weight:600; font-size:9px; min-width:50px; padding:6px 3px; }
  .tv-remote-btn.app.netflix { background:rgba(229,9,20,0.15); }
  .tv-remote-btn.app.youtube { background:rgba(255,0,0,0.15); }
  .tv-remote-btn.app.prime { background:rgba(0,168,225,0.12); }
  .tv-remote-btn.app.disney { background:rgba(17,60,207,0.15); }
  .tv-remote-btn.dpad { min-width:44px; min-height:44px; border-radius:10px; }
  .tv-remote-btn.dpad.ok { background:rgba(79,195,247,0.12); border:1px solid rgba(79,195,247,0.15); }
  .tv-remote-btn.dpad.ok span { color:#4fc3f7; font-weight:700; font-size:12px; }
  .tv-remote-label { font-size:8px; color:rgba(255,255,255,0.35); letter-spacing:0.3px; }
  #tv-no-connection { text-align:center; padding:20px; color:rgba(255,255,255,0.25); font-size:12px; }
  #tv-scan-results { margin-bottom:8px; }
  #tv-device-list { display:flex; flex-direction:column; gap:4px; padding:4px 0; }
  #tv-device-list .device-btn { width:100%; background:rgba(255,255,255,0.06); border:none; border-radius:8px; color:rgba(255,255,255,0.8); padding:10px 12px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .1s; }
  #tv-device-list .device-btn:active { background:rgba(255,255,255,0.12); }
  #tv-device-list .device-btn svg { width:18px; height:18px; fill:rgba(255,255,255,0.4); flex-shrink:0; }
  #tv-device-list .device-btn .name { flex:1; text-align:left; }
  #tv-device-list .device-btn .signal { font-size:10px; color:rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="app">
  <div id="face-container">
    <div id="face">
      <div id="brow-group">
        <div class="brow" id="left-brow"></div>
        <div class="brow" id="right-brow"></div>
      </div>
      <div id="eye-group">
        <div class="eye" id="left-eye">
          <div class="pupil"></div>
        </div>
        <div class="eye" id="right-eye">
          <div class="pupil"></div>
        </div>
      </div>
      <div id="mouth-area">
        <div id="mouth"></div>
      </div>
      <div id="name-label">ALF-I</div>
    </div>
    <div id="status-text">READY</div>
  </div>
  <div id="bottom-area">
    <div id="tv-status-bar" onclick="toggleTVPanel()">
      <svg viewBox="0 0 24 24" id="tv-status-icon"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      <span id="tv-status-text">No TV Connected</span>
    </div>
    <div id="input-row">
      <input id="input" type="text" placeholder="Type a message..." autofocus>
      <button class="icon-btn" id="reset-btn" onclick="resetConversation()" title="New conversation">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="icon-btn" id="tv-btn" onclick="toggleTVPanel()" title="TV Remote">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      </button>
      <button class="icon-btn" id="voice-btn" onclick="toggleVoice()" title="Voice input">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="icon-btn active" id="tts-toggle" onclick="toggleTTS()" title="Voice output">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <button class="icon-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const statusEl = document.getElementById('status-text');
const voiceBtn = document.getElementById('voice-btn');
const ttsBtn = document.getElementById('tts-toggle');
const mouth = document.getElementById('mouth');
const leftEye = document.getElementById('left-eye');
const rightEye = document.getElementById('right-eye');
const leftBrow = document.getElementById('left-brow');
const rightBrow = document.getElementById('right-brow');

let userId = localStorage.getItem('alfi_user_id') || crypto.randomUUID();
localStorage.setItem('alfi_user_id', userId);
let history = [];

async function loadHistory() {
  try {
    const res = await fetch('/api/sync?user_id=' + encodeURIComponent(userId));
    const data = await res.json();
    if (data.history && data.history.length) {
      history = data.history;
      localStorage.setItem('alfi_history', JSON.stringify(history));
      console.log('Loaded', history.length, 'messages from server for', userId.slice(0, 8) + '...');
    } else {
      const saved = localStorage.getItem('alfi_history');
      if (saved) history = JSON.parse(saved);
      console.log('Server empty, loaded', history.length, 'from localStorage');
    }
  } catch (e) {
    const saved = localStorage.getItem('alfi_history');
    if (saved) history = JSON.parse(saved);
    console.log('Load failed, loaded', history.length, 'from localStorage');
  }
}
loadHistory();
let ttsEnabled = true;
let isListening = false;
let isSpeaking = false;
let isThinking = false;
let recognition = null;
let blinkTimer = null;
let browTimer = null;
let mouthAnimFrame = null;
let mouthStart = 0;

const face = document.getElementById('face');
const pupils = document.querySelectorAll('.pupil');

function blinkEyes() {
  const dur = isThinking ? 250 : 100;
  leftEye.classList.add('blink');
  rightEye.classList.add('blink');
  setTimeout(() => {
    leftEye.classList.remove('blink');
    rightEye.classList.remove('blink');
  }, dur);
  const next = isThinking ? 4000 + Math.random() * 3000 : 2000 + Math.random() * 4000;
  blinkTimer = setTimeout(blinkEyes, next);
}
blinkEyes();

function animateBrows() {
  if (isThinking || isSpeaking) { browTimer = setTimeout(animateBrows, 1000); return; }
  const both = Math.random() > 0.3;
  if (both) { leftBrow.classList.add('raise'); rightBrow.classList.add('raise'); }
  else if (Math.random() > 0.5) leftBrow.classList.add('raise');
  else rightBrow.classList.add('raise');
  setTimeout(() => {
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
  }, 500);
  const next = 2000 + Math.random() * 4000;
  browTimer = setTimeout(animateBrows, next);
}
animateBrows();

function startThinking() {
  isThinking = true;
  face.classList.add('thinking');
  leftBrow.classList.add('raise');
  rightBrow.classList.add('raise');
}

function stopThinking() {
  isThinking = false;
  face.classList.remove('thinking');
  leftBrow.classList.remove('raise');
  rightBrow.classList.remove('raise');
}

function happyReaction() {
  leftEye.classList.add('widen');
  rightEye.classList.add('widen');
  leftBrow.classList.add('raise');
  rightBrow.classList.add('raise');
  setTimeout(() => {
    leftEye.classList.remove('widen');
    rightEye.classList.remove('widen');
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
  }, 600);
}

function startMouthAnimation() {
  mouth.classList.add('open');
  mouthStart = performance.now();

  function step(time) {
    if (!isSpeaking) return;
    const t = (time - mouthStart) / 1000;

    const fSyllable = 4.5 + 1.2 * Math.sin(t * 0.4);
    const fFast = 7 + 2 * Math.sin(t * 0.6 + 0.8);
    const fPhrase = 1.4 + 0.6 * Math.sin(t * 0.25 + 1.5);

    const vowels = Math.abs(Math.sin(t * fSyllable * Math.PI));
    const consonants = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * fFast * Math.PI * 2));
    const phrasing = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * fPhrase * Math.PI * 2));

    let raw = vowels * 0.5 + consonants * 0.2 + phrasing * 0.3;
    raw += Math.sin(t * 14.7 * Math.PI) * 0.04;
    raw += Math.sin(t * 21.3 * Math.PI + 0.6) * 0.03;
    raw += Math.sin(t * 33.1 * Math.PI + 1.8) * 0.02;

    const openness = Math.max(0.08, Math.min(1, raw));
    const minH = 5, maxH = 26;
    const h = minH + openness * (maxH - minH);

    const r = 2 + openness * 4;
    mouth.style.height = h.toFixed(1) + 'px';
    mouth.style.borderRadius = r.toFixed(1) + 'px';
    mouthAnimFrame = requestAnimationFrame(step);
  }
  mouthAnimFrame = requestAnimationFrame(step);
}

function stopMouthAnimation() {
  isSpeaking = false;
  if (mouthAnimFrame) { cancelAnimationFrame(mouthAnimFrame); mouthAnimFrame = null; }
  mouth.classList.remove('open');
  mouth.style.height = '';
  mouth.style.borderRadius = '';
}

function setSpeaking(val) {
  isSpeaking = val;
  if (val) {
    leftBrow.classList.add('raise');
    rightBrow.classList.add('raise');
    startMouthAnimation();
  } else {
    leftBrow.classList.remove('raise');
    rightBrow.classList.remove('raise');
    stopMouthAnimation();
  }
}

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = function(e) {
    input.value = e.results[0][0].transcript;
    sendMessage();
  };
  recognition.onend = function() { isListening = false; voiceBtn.classList.remove('listening'); };
  recognition.onerror = function() { isListening = false; voiceBtn.classList.remove('listening'); setStatus('VOICE ERROR'); };
}

function toggleVoice() {
  if (!recognition) { setStatus('NOT SUPPORTED'); return; }
  if (isListening) { recognition.stop(); return; }
  isListening = true;
  voiceBtn.classList.add('listening');
  recognition.start();
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsBtn.classList.toggle('active');
}

let voicesCache = [];

function loadVoices() {
  voicesCache = window.speechSynthesis.getVoices();
  console.log('Alf-I available voices:', voicesCache.map(v => v.name + ' [' + v.lang + ']').join(', '));
}
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function findVoice() {
  const vs = window.speechSynthesis.getVoices();
  const list = vs.length ? vs : voicesCache;
  if (!list.length) return null;
  const isF = n => /female|zoe|vanessa|karen|natya|fiona|catherine|serena|tracy|moira|samantha|victoria|tessa|ava|zira|hazel|heather|helen|jessa|linda|rosa|susan|veena|yuri|aria|jenny/i.test(n);
  const fems = list.filter(v => isF(v.name));
  let v;
  v = fems.find(x => x.lang.startsWith('en-AU')); if (v) return v;
  v = fems.find(x => x.lang.startsWith('en-GB')); if (v) return v;
  v = fems.find(x => x.lang.startsWith('en')); if (v) return v;
  v = list.find(x => x.lang.startsWith('en-AU')); if (v) return v;
  v = list.find(x => x.lang.startsWith('en-GB')); if (v) return v;
  return null;
}

function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const parts = text.match(/[^.!?]+[.!?]*/g) || [text];
  let idx = 0;
  let voiceInfo = null;

  function speakNext() {
    if (idx >= parts.length) { setSpeaking(false); return; }
    const u = new SpeechSynthesisUtterance(parts[idx].trim());
    u.rate = 0.88;
    u.pitch = 1.25 + (Math.sin(idx * 1.7) * 0.06);
    const voice = findVoice();
    if (voice) { u.voice = voice; if (!voiceInfo) voiceInfo = voice.name + ' ' + voice.lang; }
    u.onstart = () => setSpeaking(true);
    u.onend = () => {
      idx++;
      const p = parts[idx - 1].trim();
      const pause = /[,;:]$/.test(p) ? 180 : /[.!?]$/.test(p) ? 350 : 100;
      setTimeout(speakNext, pause);
    };
    u.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(u);
  }
  speakNext();
  if (voiceInfo) console.log('Alf-I voice:', voiceInfo);
  else console.log('Alf-I voice: default');
}

function saveHistory() {
  localStorage.setItem('alfi_history', JSON.stringify(history));
  console.log('Saving', history.length, 'messages for user', userId.slice(0, 8) + '...');
  return fetch('/api/sync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: userId, history: history })
  }).catch(() => {});
}

function setStatus(msg) { statusEl.textContent = msg; }

async function processChatLoop() {
  let done = false, loopCount = 0, finalContent = '';
  while (!done && loopCount < 10) {
    loopCount++;
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    if (data.error) { stopThinking(); setStatus('ERR: ' + data.error.slice(0, 60)); return null; }
    if (data.type === 'tool_call') {
      history.push({ role: 'assistant', content: data.content || null, tool_calls: data.tool_calls });
      saveHistory();
      for (const tc of data.tool_calls) {
        setStatus('AI: ' + tc.function.name);
        const result = await executeToolCall(tc);
        history.push({ role: 'tool', tool_call_id: tc.id, content: JSON.stringify(result) });
        saveHistory();
      }
    } else { done = true; finalContent = data.content; }
  }
  if (loopCount >= 10) { setStatus('MAX TOOL CALLS'); finalContent = finalContent || 'Max tool calls reached.'; }
  return finalContent;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (text.toUpperCase() === 'EXPORT') {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(history))));
    const full = 'MEMORY:' + encoded;
    try { await navigator.clipboard.writeText(full); setStatus('EXPORTED'); }
    catch (e) { input.value = full; input.select(); setStatus('COPY MANUALLY'); }
    return;
  }

  const memMatch = text.match(/^MEMORY:(.+)/i);
  if (memMatch) {
    try {
      const decoded = JSON.parse(decodeURIComponent(escape(atob(memMatch[1].trim()))));
      if (Array.isArray(decoded) && decoded.length) { history = decoded; saveHistory(); setStatus('RESTORED'); }
      else { setStatus('EMPTY'); }
    } catch (e) { setStatus('INVALID'); }
    return;
  }

  setStatus('...');
  startThinking();
  history.push({ role: 'user', content: text });
  saveHistory();

  try {
    const content = await processChatLoop();
    stopThinking();
    if (content) {
      history.push({ role: 'assistant', content });
      saveHistory();
      setStatus('READY');
      happyReaction();
      setTimeout(() => speak(content), 300);
    }
  } catch (e) {
    stopThinking();
    setStatus('CONNECTION ERROR');
  }
}

function resetConversation() {
  if (!confirm('Are you sure you want to reset the conversation? This will clear all history.')) return;
  history = [];
  localStorage.removeItem('alfi_history');
  saveHistory();
  window.speechSynthesis.cancel();
  setSpeaking(false);
  setStatus('READY');
  input.focus();
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

let tvRemotePanelOpen = false;

function toggleTVPanel() {
  tvRemotePanelOpen = !tvRemotePanelOpen;
  document.getElementById('tv-overlay').classList.toggle('active', tvRemotePanelOpen);
  document.getElementById('tv-panel').classList.toggle('active', tvRemotePanelOpen);
  if (tvRemotePanelOpen) updateTVRemoteUI();
}

class TVBluetoothRemote {
  constructor() {
    this.device = null; this.server = null; this.characteristic = null;
    this.connected = false; this.deviceName = '';
    this.isNative = typeof window.Capacitor !== 'undefined' && window.Capacitor.isNative && window.Capacitor.Plugins?.BluetoothLe;
    this.blePlugin = this.isNative ? window.Capacitor.Plugins.BluetoothLe : null;
    this._discoveredDevices = [];
    this._nativeScanTimer = null;
  }

  async scan() {
    if (this.isNative) return this._scanNative();
    return this._scanWeb();
  }

  async _scanWeb() {
    try {
      if (!('bluetooth' in navigator)) return { success: false, error: 'Web Bluetooth not supported on this browser. Use Chrome or the native mobile app.' };
      const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [] });
      this.device = device; this.deviceName = device.name || 'Unknown Device';
      updateTVStatusBar(); updateTVRemoteUI();
      device.addEventListener('gattserverdisconnected', () => {
        this.connected = false; this.server = null; this.characteristic = null;
        updateTVStatusBar(); updateTVRemoteUI();
      });
      return await this._connectWeb();
    } catch (e) {
      if (e.name === 'NotFoundError') return { success: false, error: 'No device selected' };
      return { success: false, error: e.message };
    }
  }

  async _connectWeb() {
    if (!this.device) return { success: false, error: 'No device selected' };
    try {
      this.server = await this.device.gatt.connect();
      this.connected = true;
      const services = await this.server.getPrimaryServices();
      let foundChar = null;
      for (const service of services) {
        const chars = await service.getCharacteristics();
        for (const char of chars) {
          if (char.properties.write || char.properties.writeWithoutResponse) { foundChar = char; break; }
        }
        if (foundChar) break;
      }
      this.characteristic = foundChar;
      updateTVStatusBar(); updateTVRemoteUI();
      return { success: true, device: this.deviceName, characteristic_found: !!foundChar, characteristic_uuid: foundChar ? foundChar.uuid : null };
    } catch (e) { this.connected = false; return { success: false, error: e.message }; }
  }

  async _scanNative() {
    try {
      await this.blePlugin.initialize();
      this._discoveredDevices = [];
      showDiscoveredDevices([]);
      await this.blePlugin.startScanning(
        { services: [], allowDuplicates: false },
        (result) => {
          const name = result.localName || result.name || '';
          if (!name) return;
          if (!this._discoveredDevices.find(d => d.deviceId === result.deviceId)) {
            this._discoveredDevices.push({ deviceId: result.deviceId, name, rssi: result.rssi });
            showDiscoveredDevices(this._discoveredDevices);
          }
        }
      );
      return new Promise((resolve) => {
        this._nativeScanTimer = setTimeout(async () => {
          try { await this.blePlugin.stopScanning(); } catch (e) {}
          hideDiscoveredDevices();
          if (this._discoveredDevices.length === 0) resolve({ success: false, error: 'No devices found. Make sure your TV is discoverable.' });
          else resolve({ success: false, action_required: 'select_device', message: 'Tap a device in the list to connect.' });
        }, 8000);
      });
    } catch (e) { return { success: false, error: e.message }; }
  }

  async connectToDevice(deviceId, name) {
    if (this.isNative) return this._connectNative(deviceId, name);
    return this._connectWeb();
  }

  async _connectNative(deviceId, name) {
    try {
      await this.blePlugin.connect({ deviceId });
      this.device = deviceId; this.deviceName = name; this.connected = true;
      const svcResult = await this.blePlugin.getServices({ deviceId });
      let foundChar = null;
      for (const svc of svcResult.services || []) {
        for (const ch of svc.characteristics || []) {
          if (ch.properties?.includes('write') || ch.properties?.includes('writeWithoutResponse')) {
            foundChar = { service: svc.service, characteristic: ch.characteristic };
            break;
          }
        }
        if (foundChar) break;
      }
      this.characteristic = foundChar;
      updateTVStatusBar(); updateTVRemoteUI();
      return { success: true, device: name, characteristic_found: !!foundChar };
    } catch (e) { this.connected = false; return { success: false, error: e.message }; }
  }

  async sendCommand(action) {
    if (!this.connected) return { success: false, error: 'TV not connected' };
    if (this.isNative) return this._sendNative(action);
    return this._sendWeb(action);
  }

  async _sendWeb(action) {
    if (!this.characteristic) return { success: false, error: 'No writable characteristic found' };
    const encoder = new TextEncoder();
    const attempts = [
      encoder.encode('KEY_' + action.toUpperCase()),
      new Uint8Array([this.getKeyCode(action)]),
      encoder.encode(action)
    ];
    for (const data of attempts) {
      try {
        if (this.characteristic.properties.write) await this.characteristic.writeValue(data);
        else if (this.characteristic.properties.writeWithoutResponse) await this.characteristic.writeValueWithoutResponse(data);
        return { success: true, action };
      } catch (e) { continue; }
    }
    return { success: false, error: 'Failed to write to characteristic' };
  }

  async _sendNative(action) {
    if (!this.characteristic) return { success: false, error: 'No writable characteristic found' };
    const payload = 'KEY_' + action.toUpperCase();
    const bytes = new TextEncoder().encode(payload);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    const base64 = btoa(binary);
    try {
      await this.blePlugin.write({
        deviceId: this.device, service: this.characteristic.service,
        characteristic: this.characteristic.characteristic, value: base64
      });
      return { success: true, action };
    } catch (e) { return { success: false, error: e.message }; }
  }

  async disconnect() {
    if (this.isNative) return this._disconnectNative();
    return this._disconnectWeb();
  }

  async _disconnectWeb() {
    try { if (this.device && this.device.gatt) this.device.gatt.disconnect(); } catch (e) {}
    this.connected = false; this.server = null; this.characteristic = null;
    this.device = null; this.deviceName = '';
    updateTVStatusBar(); updateTVRemoteUI();
    return { success: true };
  }

  async _disconnectNative() {
    try { if (this.device) await this.blePlugin.disconnect({ deviceId: this.device }); } catch (e) {}
    if (this._nativeScanTimer) { clearTimeout(this._nativeScanTimer); this._nativeScanTimer = null; }
    this.connected = false; this.server = null; this.characteristic = null;
    this.device = null; this.deviceName = '';
    updateTVStatusBar(); updateTVRemoteUI();
    return { success: true };
  }

  getKeyCode(action) {
    const map = {
      toggle_power:0x30, power_on:0x30, power_off:0x30,
      volume_up:0x80, volume_down:0x81, mute:0x7F,
      channel_up:0x9C, channel_down:0x9D,
      home:0x223, back:0x224, menu:0x225, exit:0x22A,
      up:0x52, down:0x51, left:0x50, right:0x4F, select:0x28,
      play:0xB0, pause:0xB1, stop:0xB7, rewind:0xB4, fast_forward:0xB3, record:0xB2
    };
    return map[action] || 0x00;
  }

  getStatus() {
    return { connected: this.connected, device_name: this.deviceName || null };
  }
}

const tvRemote = new TVBluetoothRemote();

function updateTVStatusBar() {
  const el = document.getElementById('tv-status-text');
  if (tvRemote.connected) { el.textContent = tvRemote.deviceName; el.className = 'connected'; }
  else if (tvRemote.device) { el.textContent = 'Tap to connect'; el.className = ''; }
  else { el.textContent = 'No TV Connected'; el.className = ''; }
}

function updateTVRemoteUI() {
  const dot = document.getElementById('tv-dot');
  const name = document.getElementById('tv-device-name');
  const scanBtn = document.getElementById('tv-scan-btn');
  const discBtn = document.getElementById('tv-disconnect-btn');
  const ctrls = document.getElementById('tv-remote-controls');
  const noConn = document.getElementById('tv-no-connection');
  if (tvRemote.connected) {
    dot.className = 'tv-dot connected';
    name.textContent = tvRemote.deviceName;
    scanBtn.style.display = 'none'; discBtn.style.display = 'inline-block';
    ctrls.style.display = 'block'; noConn.style.display = 'none';
  } else if (tvRemote.device) {
    dot.className = 'tv-dot';
    name.textContent = tvRemote.deviceName + ' (disconnected)';
    scanBtn.style.display = 'none'; discBtn.style.display = 'inline-block';
    ctrls.style.display = 'none'; noConn.style.display = 'block';
    noConn.textContent = 'Device disconnected. Tap Disconnect to remove.';
  } else {
    dot.className = 'tv-dot';
    name.textContent = 'Not connected';
    scanBtn.style.display = 'inline-block'; discBtn.style.display = 'none';
    ctrls.style.display = 'none'; noConn.style.display = 'block';
    noConn.textContent = 'Scan for a Bluetooth TV to enable the remote.';
  }
}

async function scanForTV() {
  const r = await tvRemote.scan();
  if (!r.success && r.error) setStatus('TV: ' + r.error);
}

async function disconnectTV() {
  await tvRemote.disconnect(); setStatus('TV DISCONNECTED');
}

async function sendTVCommand(action) {
  if (!tvRemote.connected) { setStatus('TV NOT CONNECTED'); return; }
  setStatus('TV: ' + action);
  const r = await tvRemote.sendCommand(action);
  if (!r.success) setStatus('TV ERR: ' + (r.error || 'failed'));
  else setTimeout(() => setStatus('READY'), 800);
}

function showDiscoveredDevices(devices) {
  const container = document.getElementById('tv-device-list');
  const section = document.getElementById('tv-scan-results');
  if (!container || !section) return;
  section.style.display = 'block';
  if (devices.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:10px;color:rgba(255,255,255,0.3);font-size:12px">Scanning...</div>';
    return;
  }
  container.innerHTML = devices.map(d =>
    '<button class="device-btn" onclick="selectNativeDevice(\'' + d.deviceId + '\',\'' + d.name.replace(/'/g,"\\'") + '\')">' +
      '<svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>' +
      '<span class="name">' + d.name + '</span>' +
      '<span class="signal">' + (d.rssi > -60 ? '&#9679;' : '&#9675;') + '</span>' +
    '</button>'
  ).join('');
}

function hideDiscoveredDevices() {
  const section = document.getElementById('tv-scan-results');
  if (section) section.style.display = 'none';
}

async function selectNativeDevice(deviceId, name) {
  setStatus('CONNECTING...');
  hideDiscoveredDevices();
  const result = await tvRemote.connectToDevice(deviceId, name);
  if (!result.success) setStatus('TV ERR: ' + (result.error || 'connection failed'));
  else setStatus('READY');
}

async function executeToolCall(tc) {
  const name = tc.function.name;
  let args = {};
  try { args = JSON.parse(tc.function.arguments); } catch (e) {}
  switch (name) {
    case 'connect_tv':
      if (tvRemote.connected) return { success: true, already_connected: true, device: tvRemote.deviceName };
      if (!tvRemotePanelOpen) toggleTVPanel();
      if (tvRemote.isNative) { scanForTV(); return { success: false, action_required: 'select_device', message: 'Scanning for nearby TVs...' }; }
      return { success: false, action_required: 'scan', message: 'Tap the Scan button in the TV Remote panel to find your TV' };
    case 'disconnect_tv':
      await tvRemote.disconnect(); return { success: true };
    case 'tv_status':
      return tvRemote.getStatus();
    case 'control_tv':
      if (!tvRemote.connected) return { success: false, error: 'No TV connected. Ask user to scan first.' };
      return await tvRemote.sendCommand(args.action);
    default:
      return { error: 'Unknown function: ' + name };
  }
}

      <button class="tv-remote-btn" onclick="sendTVCommand('play')">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <span class="tv-remote-label">PLAY</span>
      </button>
      <button class="tv-remote-btn" onclick="sendTVCommand('pause')">
        <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <span class="tv-remote-label">PAUSE</span>
      </button>
      <button class="tv-remote-btn" onclick="sendTVCommand('stop')">
        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
        <span class="tv-remote-label">STOP</span>
      </button>
      <button class="tv-remote-btn" onclick="sendTVCommand('fast_forward')">
        <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
        <span class="tv-remote-label">FF</span>
      </button>
    </div>

    <div class="tv-section-label">Apps</div>
    <div class="tv-remote-row">
      <button class="tv-remote-btn app netflix" onclick="sendTVCommand('netflix')">Netflix</button>
      <button class="tv-remote-btn app youtube" onclick="sendTVCommand('youtube')">YouTube</button>
      <button class="tv-remote-btn app prime" onclick="sendTVCommand('prime_video')">Prime</button>
      <button class="tv-remote-btn app disney" onclick="sendTVCommand('disney_plus')">Disney+</button>
    </div>

    <div class="tv-section-label">Input</div>
    <div class="tv-remote-row">
      <button class="tv-remote-btn" onclick="sendTVCommand('hdmi1')">HDMI 1</button>
      <button class="tv-remote-btn" onclick="sendTVCommand('hdmi2')">HDMI 2</button>
      <button class="tv-remote-btn" onclick="sendTVCommand('hdmi3')">HDMI 3</button>
      <button class="tv-remote-btn" onclick="sendTVCommand('tv_mode')">TV</button>
    </div>
  </div>
  <div id="tv-no-connection">Scan for a Bluetooth TV to enable the remote.</div>
</div>

</body>
</html>
